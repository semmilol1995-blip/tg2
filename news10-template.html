<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;

display:flex;
align-items:center;
justify-content:center;
position:relative;

/* 🔥 БАЗА (темний центр) */
background:
radial-gradient(circle at top left, rgba(168,85,247,0.45), transparent 40%),
radial-gradient(circle at bottom right, rgba(168,85,247,0.45), transparent 40%),
#000000;
}

/* === WRAPPER === */
.wrapper{
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:100%;
position:relative;
}

/* === FRAME (ЗВИЧАЙНА ФІОЛЕТОВА) === */
.frame{
position:relative;

display:inline-flex;
align-items:center;
justify-content:center;

/* 🔥 ПРОСТА РАМКА */
border:5px solid #a855f7;

box-sizing:border-box;

width:auto;
height:auto;

max-width:820px;
max-height:820px;

/* легкий glow */
box-shadow:0 0 25px rgba(168,85,247,0.25);
}

/* === IMAGE === */
.frame img{
display:block;

max-width:810px;
max-height:810px;

width:auto;
height:auto;

object-fit:contain;
}

/* === LABEL === */
.label{
position:absolute;
top:-22px;
left:50%;
transform:translateX(-50%);

background:#a855f7;
color:white;

font-size:18px;
font-weight:900;
letter-spacing:2px;

padding:6px 24px;

z-index:5;

box-shadow:0 0 20px rgba(168,85,247,0.6);
}

/* === FOOTER === */
.bottomBar{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;

font-size:16px;
font-weight:800;
color:white;

opacity:0.85;
}

.bottomBar img{
width:18px;
margin-right:8px;
filter:brightness(0) invert(1);
}

/* === GRAIN === */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.06;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
pointer-events:none;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="frame">

    <div class="label">{{LABEL}}</div>

    <img src="{{IMAGE}}">

  </div>

</div>

<div class="grain"></div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
