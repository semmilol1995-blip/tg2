<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;

/* 🔥 темно-фіолетовий градієнт */
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;

/* 🔥 ГРАДІЄНТ ЯК ТИ ХОТІВ */
background: radial-gradient(circle at top, #1a0f2e 0%, #0a0618 40%, #000000 100%);
}

/* === WRAP === */
.wrapper{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

/* === FRAME === */
.frame{
position:relative;

/* фікс ширина */
width:820px;
max-width:820px;
min-width:820px;

/* висота адаптивна */
max-height:820px;

background:white;
padding:10px;
box-sizing:border-box;

display:flex;
align-items:center;
justify-content:center;
}

/* IMAGE */
.frame img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
}

/* === LABEL (плаваючий) === */
.label{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);

background:#a855f7;
color:white;

font-size:16px;
font-weight:900;
letter-spacing:2px;

padding:6px 20px;
z-index:5;
}

/* glow */
.label{
box-shadow:0 0 20px rgba(168,85,247,0.6);
}

/* === FOOTER === */
.bottomBar{
position:absolute;
bottom:25px;
display:flex;
align-items:center;
font-size:16px;
font-weight:800;
color:white;
opacity:0.85;
}

.bottomBar img{
width:18px;
margin-right:8px;
filter:brightness(0) invert(1);
}

/* grain */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.06;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
pointer-events:none;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="frame">

    <div class="label">{{LABEL}}</div>

    <img src="{{IMAGE}}">

  </div>

</div>

<div class="grain"></div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
