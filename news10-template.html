<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;

/* 🔥 ФІОЛЕТОВИЙ ГРАДІЄНТ */
background: radial-gradient(circle at top, #1a0f2e 0%, #0a0618 40%, #000000 100%);

display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* subtle glow */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at top, rgba(168,85,247,0.25), transparent 60%);
pointer-events:none;
}

/* === WRAPPER === */
.wrapper{
position:relative;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

/* === FRAME (ГОЛОВНЕ) === */
.frame{
position:relative;

display:flex;
align-items:center;
justify-content:center;

/* 🔥 РАМКА 5px */
border:5px solid white;
box-sizing:border-box;

/* ❌ без заливки */
background:transparent;

/* розмір */
width:820px;
min-width:820px;
max-width:820px;

max-height:820px;
}

/* === IMAGE === */
.frame img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
}

/* === LABEL (плаваючий) === */
.label{
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);

background:#a855f7;
color:white;

font-size:18px;
font-weight:900;
letter-spacing:2px;

padding:6px 22px;

z-index:5;

/* glow */
box-shadow:0 0 20px rgba(168,85,247,0.6);
}

/* === FOOTER === */
.bottomBar{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;

font-size:16px;
font-weight:800;
color:white;

opacity:0.85;
}

.bottomBar img{
width:18px;
margin-right:8px;
filter:brightness(0) invert(1);
}

/* === GRAIN === */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.06;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
pointer-events:none;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="frame">

    <div class="label">{{LABEL}}</div>

    <img src="{{IMAGE}}">

  </div>

</div>

<div class="grain"></div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
