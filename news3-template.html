<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* затемнення зверху */
.fadeTop{
position:absolute;
top:0;
width:100%;
height:45%;
background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
}

/* нижня картка */
.bottomCard{
position:absolute;
bottom:0;
width:100%;
height:45%;
background:#a855f7; /* 🔥 фіолетовий фон */
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:40px;
box-sizing:border-box;
}

/* label */
.label{
background:#e5e7eb; /* сірий */
color:#a855f7; /* фіолетовий текст */
font-weight:900;
font-size:20px;
padding:10px 28px;
margin-bottom:30px;
}

/* текст */
.text{
width:75%;
text-align:center;

font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.2;
text-transform:uppercase;
letter-spacing:1px;

color:white; /* 🔥 білий */
}

/* grain */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.1;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* tg */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="fadeTop"></div>
<div class="grain"></div>

<div class="bottomCard">

  <div class="label">ФАКТ</div>

  <div class="text">
    {{TEXT}}
  </div>

</div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
