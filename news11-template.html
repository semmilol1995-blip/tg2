<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:radial-gradient(circle at center, #1a0833 0%, #05010a 70%);
font-family:'Inter', sans-serif;
overflow:hidden;
color:white;
}

/* PLAYERS */
.players{
position:absolute;
bottom:180px;
width:100%;
height:500px;
}

/* COMMON */
.player{
position:absolute;
bottom:0;
transform:translateX(-50%);
filter:drop-shadow(0 20px 40px rgba(0,0,0,0.9));
}

.player img{
height:100%;
object-fit:contain;
}

/* LAYOUT */
.p1{ left:50%; height:520px; z-index:5;}
.p2{ left:30%; height:460px; z-index:4;}
.p3{ left:70%; height:460px; z-index:4;}
.p4{ left:15%; height:420px; z-index:3;}
.p5{ left:85%; height:420px; z-index:3;}

/* TITLE */
.title{
position:absolute;
bottom:140px;
width:100%;
text-align:center;
font-family:'Anton';
font-size:120px;
color:#facc15;
letter-spacing:4px;
}

/* SUB */
.subtitle{
position:absolute;
bottom:100px;
width:100%;
text-align:center;
font-weight:800;
font-size:28px;
letter-spacing:3px;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
opacity:0.8;
font-weight:600;
}
</style>
</head>

<body>

<div class="players">
  <div class="player p4"><img src="{{P3}}"></div>
  <div class="player p2"><img src="{{P1}}"></div>
  <div class="player p3"><img src="{{P2}}"></div>
  <div class="player p1"><img src="{{P5}}"></div>
  <div class="player p5"><img src="{{P4}}"></div>
</div>

<div class="title">ЧЕМПІОНИ</div>
<div class="subtitle">{{TOURNAMENT}}</div>

<div class="footer">
t.me/zbr4_cast
</div>

</body>
</html>
