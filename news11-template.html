<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:linear-gradient(to bottom, #1a0833 0%, #000 100%);
color:white;
overflow:hidden;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.06;
}

/* PLAYERS */
.players{
position:absolute;
bottom:260px;
width:100%;
height:520px;
}

/* PLAYER */
.player{
position:absolute;
bottom:0;
transform:translateX(-50%);
filter:drop-shadow(0 30px 80px rgba(0,0,0,1));
}

.player img{
height:100%;
object-fit:contain;
}

/* DEPTH */
.p1{ left:50%; height:580px; z-index:5;}
.p2{ left:32%; height:520px; z-index:4;}
.p3{ left:68%; height:520px; z-index:4;}
.p4{ left:12%; height:460px; z-index:3;}
.p5{ left:88%; height:460px; z-index:3;}

/* FADE */
.fade{
position:absolute;
bottom:0;
width:100%;
height:500px;
background:linear-gradient(
  to top,
  #000 0%,
  rgba(0,0,0,0.95) 40%,
  transparent 100%
);
z-index:6;
}

/* TEAM LOGO */
.teamLogo{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:240px;
z-index:9;
display:flex;
justify-content:center;
align-items:center;
}

.teamLogo img{
max-height:100px;
object-fit:contain;
}

/* TITLE */
.title{
position:absolute;
bottom:110px;
width:100%;
text-align:center;

font-family:'Anton', sans-serif;
font-size:180px;
letter-spacing:2px;
line-height:0.9;

color:#facc15;
z-index:10;
}

/* SUBTITLE */
.subtitle{
position:absolute;
bottom:70px;
width:100%;
text-align:center;

font-weight:800;
font-size:32px;
letter-spacing:2px;
opacity:0.9;

z-index:10;
}

/* FOOTER */
.footer{
position:absolute;
bottom:15px;
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:6px;

opacity:0.7;
font-weight:600;
font-size:14px;
z-index:10;
}

.footer img{
width:16px;
filter:invert(1);
opacity:0.9;
}
</style>
</head>

<body>

<div class="noise"></div>

<div class="players">
  <div class="player p4"><img src="{{P4}}"></div>
  <div class="player p2"><img src="{{P2}}"></div>
  <div class="player p3"><img src="{{P3}}"></div>
  <div class="player p1"><img src="{{P1}}"></div>
  <div class="player p5"><img src="{{P5}}"></div>
</div>

<div class="fade"></div>

<div class="teamLogo">
  <img src="{{TEAM_LOGO}}">
</div>

<div class="title">ЧЕМПІОНИ</div>
<div class="subtitle">{{TOURNAMENT}}</div>

<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
