<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:linear-gradient(135deg,#0b0b0f,#1a1030);
color:white;
overflow:hidden;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.06;
}

/* PLAYERS */
.players{
position:absolute;
bottom:200px;
width:100%;
height:520px;
}

/* COMMON */
.player{
position:absolute;
bottom:0;
transform:translateX(-50%);
filter:drop-shadow(0 25px 60px rgba(0,0,0,0.9));
}

.player img{
height:100%;
object-fit:contain;
}

/* DEPTH */
.p1{ left:50%; height:560px; z-index:5;}
.p2{ left:32%; height:500px; z-index:4;}
.p3{ left:68%; height:500px; z-index:4;}
.p4{ left:12%; height:440px; z-index:3;}
.p5{ left:88%; height:440px; z-index:3;}

/* FADE */
.fade{
position:absolute;
bottom:0;
width:100%;
height:420px;
background:linear-gradient(
  to top,
  #0b0b0f 0%,
  #0b0b0f 40%,
  rgba(11,11,15,0.9) 60%,
  rgba(11,11,15,0.5) 75%,
  transparent 100%
);
z-index:6;
}

/* TITLE (ЧЕМПІОНИ) */
.title{
position:absolute;
bottom:190px;
width:100%;
text-align:center;
font-family:'Inter', sans-serif;
font-weight:800;
font-size:110px;
color:#facc15;
letter-spacing:2px;
z-index:10;
}

/* SUBTITLE */
.subtitle{
position:absolute;
bottom:150px;
width:100%;
text-align:center;
font-weight:800;
font-size:28px;
letter-spacing:3px;
z-index:10;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
opacity:0.8;
font-weight:600;
z-index:10;
}
</style>
</head>

<body>

<div class="noise"></div>

<div class="players">
  <div class="player p4"><img src="{{P3}}"></div>
  <div class="player p2"><img src="{{P1}}"></div>
  <div class="player p3"><img src="{{P2}}"></div>
  <div class="player p1"><img src="{{P5}}"></div>
  <div class="player p5"><img src="{{P4}}"></div>
</div>

<!-- 🔥 fade поверх ніг -->
<div class="fade"></div>

<div class="title">ЧЕМПІОНИ</div>
<div class="subtitle">{{TOURNAMENT}}</div>

<div class="footer">
t.me/zbr4_cast
</div>

</body>
</html>
