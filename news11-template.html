<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#05010a;
overflow:hidden;
position:relative;
color:white;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(8px) brightness(0.4);
z-index:0;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 50% 40%, rgba(139,92,246,0.25), transparent 60%),
linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.9));
z-index:1;
}

.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* PLAYERS */
.players{
position:absolute;
bottom:180px;
width:100%;
height:520px;
z-index:3;
}

/* COMMON */
.player{
position:absolute;
bottom:0;
transform:translateX(-50%);
filter:drop-shadow(0 20px 40px rgba(0,0,0,0.8));
}

.player img{
height:100%;
object-fit:contain;
}

/* CENTER (P1) */
.p1{
left:50%;
height:520px;
z-index:5;
}

/* BACK CENTER (P5) */
.p5{
left:50%;
height:480px;
bottom:40px;
z-index:4;
opacity:0.95;
}

/* LEFT FRONT */
.p2{
left:30%;
height:460px;
z-index:3;
}

/* RIGHT FRONT */
.p3{
left:70%;
height:460px;
z-index:3;
}

/* FAR LEFT */
.p4{
left:15%;
height:420px;
bottom:-10px;
z-index:2;
opacity:0.9;
}

/* FAR RIGHT */
.p6{
left:85%;
height:420px;
bottom:-10px;
z-index:2;
opacity:0.9;
}

/* TITLE */
.title{
position:absolute;
bottom:140px;
width:100%;
text-align:center;
font-family:'Anton', sans-serif;
font-size:120px;
letter-spacing:4px;
color:#facc15;
z-index:6;
}

/* TOURNAMENT */
.subtitle{
position:absolute;
bottom:100px;
width:100%;
text-align:center;
font-weight:800;
font-size:28px;
letter-spacing:3px;
opacity:0.9;
z-index:6;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.85;
z-index:6;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="noise"></div>

<div class="players">

  <div class="player p4"><img src="{{P3}}"></div>
  <div class="player p2"><img src="{{P1}}"></div>
  <div class="player p5"><img src="{{P5}}"></div>
  <div class="player p3"><img src="{{P2}}"></div>
  <div class="player p6"><img src="{{P4}}"></div>

</div>

<div class="title">ЧЕМПІОНИ</div>
<div class="subtitle">{{TOURNAMENT}}</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
