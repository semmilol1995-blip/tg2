<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
color:white;
overflow:hidden;
display:flex;
flex-direction:column;
position:relative;
}

/* ===== BG ===== */

.bg-gradient{
position:absolute;
inset:0;
background:
radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.9) 0%, rgba(124,58,237,0.5) 25%, rgba(124,58,237,0.2) 45%, transparent 60%),
linear-gradient(to bottom, #1a0833 0%, #000 100%);
z-index:0;
}

.bg-zebra{
position:absolute;
inset:-25%;
z-index:1;
opacity:0.4;
mix-blend-mode:overlay;
filter:blur(0.5px);
transform:rotate(35deg) scale(1.4) skewX(-6deg);
background-size:cover;
}

/* ===== HEADER ===== */

.header{
margin-top:40px;
text-align:center;
z-index:5;
}

.date{
display:inline-block;
margin-bottom:10px;
padding:6px 14px;
background:#d9dde3;
color:#000;
font-size:14px;
font-weight:800;
border-radius:3px;
}

/* 🔥 TITLE */

.title{
font-size:64px;
font-weight:900;
line-height:1;
}

/* 🔥 ПІДНЯЛИ ТУРНІР БЛИЖЧЕ */

.subtitle{
margin-top:2px; /* 🔥 було 6-10 */
font-size:20px;
opacity:0.85;
}

/* ===== CONTENT ===== */

.content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding-bottom:90px;
z-index:5;
}

/* ===== MATCHES ===== */

.matches{
width:100%;
display:flex;
flex-direction:column;
gap:10px; /* 🔥 компактніше */

max-width:760px;
margin:0 auto;
}

/* ===== CARD ===== */

.card{
display:grid;
grid-template-columns:1fr 140px 1fr;
height:64px;

background:#0d0d12;

/* 🔥 ФІОЛЕТОВА РАМКА */
border:1px solid rgba(124,58,237,0.6);

/* 🔥 ЛЕГКИЙ GLOW */
box-shadow:0 0 8px rgba(124,58,237,0.2);

border-radius:6px;
}

/* ===== TEAM ===== */

.team{
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
font-size:18px;
font-weight:800;
text-transform:uppercase;
}

.team:first-child{
justify-content:flex-start;
gap:12px;
}

.team:last-child{
justify-content:flex-end;
gap:12px;
}

/* ===== LOGO ===== */

.logoBox{
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
}

.logoBox img{
width:100%;
height:100%;
object-fit:contain;
}

/* ===== CENTER ===== */

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#d9dde3;
color:#000;
}

.center .main{
font-size:26px;
font-weight:900;
}

.format{
font-size:11px;
margin-top:2px;
opacity:0.7;
}
/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.85;
z-index:5;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<div class="bg-gradient"></div>
<div class="bg-zebra"></div>

<div class="header">
<div class="date" id="date"></div>
<div class="title">{{TITLE}}</div>
<div class="subtitle">{{TOURNAMENT}}</div>
</div>

<div class="content">
  <div class="matches {{GRID}}">
    {{MATCHES}}
  </div>
</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>
<script>
const months = ["СІЧНЯ","ЛЮТОГО","БЕРЕЗНЯ","КВІТНЯ","ТРАВНЯ","ЧЕРВНЯ","ЛИПНЯ","СЕРПНЯ","ВЕРЕСНЯ","ЖОВТНЯ","ЛИСТОПАДА","ГРУДНЯ"];
const d = new Date();
document.getElementById("date").innerText = d.getDate() + " " + months[d.getMonth()];
</script>

</body>
</html>
