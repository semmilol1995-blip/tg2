<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:radial-gradient(circle at top,#2a1b4a,#0b0b0f 70%);
color:white;
overflow:hidden;

display:flex;
flex-direction:column;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
}

/* HEADER */
.header{
margin-top:70px;
text-align:center;
}

.title{
font-size:72px;
font-weight:900;
letter-spacing:2px;

background:linear-gradient(90deg,#e9d5ff,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:0 0 40px rgba(168,85,247,0.5);
}

.subtitle{
margin-top:12px;
font-size:20px;
opacity:0.8;
}

/* CONTENT CENTER */
.content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* GRID */
.matches{
width:100%;
display:grid;
gap:26px;
}

/* 1 COLUMN */
.grid-1{
grid-template-columns:1fr;
max-width:650px;
margin:0 auto;
}

/* 2 COLUMNS */
.grid-2{
grid-template-columns:1fr 1fr;
max-width:850px;
margin:0 auto;
}

/* CARD */
.card{
display:grid;
grid-template-columns: 1fr 120px 1fr;
align-items:center;

height:82px;
padding:0 22px;

border-radius:22px;

background:rgba(25,10,45,0.6);
backdrop-filter:blur(16px);

border:1px solid rgba(168,85,247,0.35);

box-shadow:
0 0 35px rgba(168,85,247,0.25),
inset 0 0 25px rgba(168,85,247,0.1);
}

/* TEAM */
.team{
display:flex;
align-items:center;
gap:14px;

font-weight:800;
font-size:18px;

white-space:nowrap;

/* 🔥 ФІКС ОБРІЗАННЯ */
min-width:0;
}

/* LEFT */
.team:first-child{
justify-content:flex-start;
}

/* RIGHT */
.team:last-child{
justify-content:flex-end;
}

/* LOGO */
.logoBox{
width:46px;
height:46px;
flex-shrink:0;

border-radius:14px;
background:#0b0b0f;

display:flex;
align-items:center;
justify-content:center;

border:2px solid rgba(168,85,247,0.7);

box-shadow:
0 0 15px rgba(168,85,247,0.6),
inset 0 0 8px rgba(168,85,247,0.2);
}

.logoBox img{
width:70%;
height:70%;
object-fit:contain;
}

/* CENTER */
.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;
line-height:1;
}

/* MAIN (VS / TIME / SCORE) */
.center .main{
font-size:28px;
font-weight:900;
letter-spacing:1px;
}

/* FORMAT */
.format{
margin-top:3px;
font-size:10px;
opacity:0.55;
letter-spacing:1.5px;
}

/* FOOTER */
.footer{
margin-bottom:26px;
display:flex;
justify-content:center;
align-items:center;
font-weight:800;
font-size:16px;
opacity:0.9;
}

.footer img{
width:20px;
margin-right:8px;
filter:invert(1);
}
</style>
</head>

<body>

<div class="noise"></div>

<div class="header">
<div class="title">{{TITLE}}</div>
<div class="subtitle">{{TOURNAMENT}}</div>
</div>

<div class="content">
  <div class="matches {{GRID}}">
    {{MATCHES}}
  </div>
</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
