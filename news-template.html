<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.fadeTop{
position:absolute;
top:0;
width:100%;
height:30%;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

.fadeBottom{
position:absolute;
bottom:0;
width:100%;
height:75%;
background:linear-gradient(to top, rgba(0,0,0,0.98), transparent);
}

.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.15;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* центр */
.centerWrap{
position:absolute;
bottom:80px;
width:100%;
display:flex;
justify-content:center;
}

/* 🔥 новий контейнер */
.content{
display:flex;
flex-direction:column;
align-items:center;
}

/* label */
.label{
background:#a855f7;
color:black;
font-weight:900;
padding:10px 28px;
font-size:22px;
margin-bottom:12px; /* 🔥 відступ до тексту */
z-index:2;
}

/* блок тексту */
.box{
width:720px;
padding:45px 35px;
background:rgba(0,0,0,0.92);
border:2px solid #a855f7;
}

/* текст */
.text{
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.15;
text-transform:uppercase;
text-align:center;
letter-spacing:1px;
color:#a855f7;
}

/* tg */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="fadeTop"></div>
<div class="fadeBottom"></div>
<div class="grain"></div>

<div class="centerWrap">
  <div class="content">

    <div class="label">{{LABEL}}</div>

    <div class="box">
      <div class="text">{{TEXT}}</div>
    </div>

  </div>
</div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
