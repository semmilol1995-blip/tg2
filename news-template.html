<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.fadeTop{
position:absolute;
top:0;
width:100%;
height:30%;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

.fadeBottom{
position:absolute;
bottom:0;
width:100%;
height:75%;
background:linear-gradient(to top, rgba(0,0,0,0.98), transparent);
}

.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.15;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* блок */
.centerWrap{
position:absolute;
bottom:80px;
width:100%;
display:flex;
justify-content:center;
}

.box{
width:720px;
padding:45px 35px;
background:rgba(0,0,0,0.92);
border:2px solid #a855f7;
}

.text{
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.15;
text-transform:uppercase;
text-align:center;
letter-spacing:1px;
}

.line{
display:block;
color:#a855f7;
}

.accent{
color:white;
}

/* label */
.labelWrap{
position:absolute;
width:100%;
display:flex;
justify-content:center;
}

.label{
background:#a855f7;
color:black;
font-weight:900;
padding:10px 28px;
font-size:22px;
}

/* TG */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>

</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="fadeTop"></div>
<div class="fadeBottom"></div>
<div class="grain"></div>

<div class="labelWrap">
  <div class="label">{{LABEL}}</div>
</div>

<div class="centerWrap">
  <div class="box">
    <div class="text" id="text"></div>
  </div>
</div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

<script>
document.getElementById("text").innerHTML = `{{TEXT}}`;

// 🔥 ПРАВИЛЬНИЙ ФІКС (від text)
const textEl = document.querySelector(".text");
const label = document.querySelector(".labelWrap");

const rect = textEl.getBoundingClientRect();

// 🔥 15px від тексту
label.style.top = (rect.top - 15 - 40) + "px";
// 40 = висота label приблизно
</script>

</body>
</html>
