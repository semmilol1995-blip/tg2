<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  width:900px;
  height:900px;
  font-family:'Inter', sans-serif;

  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,0.25), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(59,130,246,0.2), transparent 40%),
    linear-gradient(135deg,#050510,#14002a);

  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* TITLE */
.title{
  font-size:72px;
  font-weight:900;
}

.subtitle{
  font-size:28px;
  color:#7dd3fc;
  margin-bottom:30px;
}

/* MAPS */
.maps{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  width:100%;
  max-width:750px;
}

/* AUTO WIDTH */
.maps:has(.map:nth-child(3)){
  max-width:420px;
}
.maps:has(.map:nth-child(5)){
  max-width:750px;
}

/* MAP */
.map{
  position:relative;
  width:130px;
  height:300px;
  border-radius:18px;
  overflow:hidden;
}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.75);
}

.blur{
  position:absolute;
  inset:0;
  backdrop-filter:blur(5px);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.95), transparent 60%);
}

.logo{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  width:55px;
}

.map-name{
  position:absolute;
  bottom:65px;
  left:12px;
  font-size:20px;
  font-weight:900;
}

.map-type{
  position:absolute;
  bottom:18px;
  left:12px;
  font-size:16px;
  font-weight:800;
}

/* TYPES */
.map.PICK .map-type{ color:#22c55e; }
.map.BAN .map-type{ color:#ef4444; }
.map.DECIDER .map-type{ color:#facc15; }

.map.BAN{
  filter:grayscale(1) brightness(0.6);
}

.map.BAN::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(45deg, transparent 48%, rgba(255,0,0,0.9) 50%, transparent 52%);
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:800;
  font-size:18px;
}

.footer img{
  width:20px;
  filter:brightness(0) invert(1);
}

</style>
</head>

<body>

<div class="title">{{TEAM1}} VS {{TEAM2}}</div>
<div class="subtitle">{{TOURNAMENT}}</div>

<div class="maps">
  {{MAPS}}
</div>

<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
