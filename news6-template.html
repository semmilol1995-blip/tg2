<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  width:1200px;
  height:630px;
  font-family:Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,0.25), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(59,130,246,0.2), transparent 40%),
    linear-gradient(135deg,#050510,#14002a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.title{
  font-size:64px;
  font-weight:900;
}

.subtitle{
  font-size:26px;
  color:#7dd3fc;
  margin-bottom:40px;
}

.maps{
  display:flex;
  gap:25px;
  justify-content:center;
  align-items:center;
}

/* MAP CARD */
.map{
  position:relative;
  width:220px;
  height:420px;
  border-radius:18px;
  overflow:hidden;

  box-shadow:
    0 0 30px rgba(139,92,246,0.4),
    0 0 80px rgba(59,130,246,0.2);
}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.75);
}

.blur{
  position:absolute;
  inset:0;
  backdrop-filter:blur(6px);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.95), transparent 60%);
}

.logo{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  width:70px;

  filter:
    drop-shadow(0 0 10px rgba(255,255,255,0.4))
    drop-shadow(0 0 25px rgba(139,92,246,0.6));
}

.map-name{
  position:absolute;
  bottom:75px;
  left:18px;
  font-size:28px;
  font-weight:900;
}

.map-type{
  position:absolute;
  bottom:22px;
  left:18px;
  font-size:20px;
  color:#cbd5f5;
}

/* DECIDER */
.decider{
  box-shadow:
    0 0 40px rgba(250,204,21,0.7),
    0 0 100px rgba(250,204,21,0.3);
}
</style>
</head>

<body>

<div class="title">{{TEAM1}} VS {{TEAM2}}</div>
<div class="subtitle">{{TOURNAMENT}}</div>

<div class="maps">
  {{MAPS}}
</div>

</body>
</html>
