<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  width:1200px;
  height:630px;
  font-family:'Inter', sans-serif;

  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,0.25), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(59,130,246,0.2), transparent 40%),
    linear-gradient(135deg,#050510,#14002a);

  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* TITLE */
.title{
  font-size:64px;
  font-weight:900;
}

.subtitle{
  font-size:26px;
  color:#7dd3fc;
  margin-bottom:40px;
}

/* MAPS */
.maps{
  display:flex;
  gap:25px;
  justify-content:center;
  align-items:center;
}

/* MAP */
.map{
  position:relative;
  width:220px;
  height:420px;
  border-radius:18px;
  overflow:hidden;

  box-shadow:
    0 0 30px rgba(139,92,246,0.4),
    0 0 80px rgba(59,130,246,0.2);
}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.75);
}

.blur{
  position:absolute;
  inset:0;
  backdrop-filter:blur(6px);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.95), transparent 60%);
}

.logo{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
}

.map-name{
  position:absolute;
  bottom:75px;
  left:18px;
  font-size:28px;
  font-weight:900;
}

.map-type{
  position:absolute;
  bottom:22px;
  left:18px;
  font-size:20px;
  font-weight:700;
}

/* PICK */
.map.PICK .map-type{ color:#22c55e; }

/* BAN */
.map.BAN .map-type{ color:#ef4444; }

.map.BAN::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(45deg, transparent 48%, rgba(255,0,0,0.8) 50%, transparent 52%);
}

.map.BAN{
  filter:grayscale(1) brightness(0.6);
}

/* DECIDER */
.map.DECIDER .map-type{ color:#facc15; }

/* ============================= */
/* 🔻 ТВОЇЙ FOOTER 1 В 1         */
/* ============================= */

.footer{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:8px;
  color:white;
  font-weight:800;
  font-size:18px;
  z-index:10;
}

.footer img{
  width:20px;
  filter:brightness(0) invert(1);
}

</style>
</head>

<body>

<div class="title">{{TEAM1}} VS {{TEAM2}}</div>
<div class="subtitle">{{TOURNAMENT}}</div>

<div class="maps">
  {{MAPS}}
</div>

<!-- 🔥 ВСТАВЛЕНИЙ FOOTER -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
