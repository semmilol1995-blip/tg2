<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
}

/* затемнення */
.fadeBottom{
position:absolute;
bottom:0;
width:100%;
height:75%;
background:linear-gradient(to top, rgba(0,0,0,0.98), transparent);
}

.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.12;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* центр */
.centerWrap{
position:absolute;
bottom:110px;
width:100%;
display:flex;
justify-content:center;
}

/* контейнер */
.content{
width:760px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

/* лапки */
.quoteMark{
font-size:64px;
color:#a855f7;
margin-bottom:15px;
line-height:1;
}

/* текст */
.text{
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.2;
text-transform:uppercase;
letter-spacing:1px;
color:white;
font-style:italic;
}

/* автор */
.author{
margin-top:30px;
font-size:22px;
font-weight:800;
color:#a855f7;
letter-spacing:1px;
}

/* tg */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="fadeBottom"></div>
<div class="grain"></div>

<div class="centerWrap">
  <div class="content">

    <div class="quoteMark">“</div>

    <div class="text">{{TEXT}}</div>

    <div class="author">{{AUTHOR}}</div>

  </div>
</div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
