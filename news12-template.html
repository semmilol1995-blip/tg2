<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
color:white;
overflow:hidden;
position:relative;
}

/* MASTER BG */
.bg-gradient{
position:absolute;
inset:0;
background:
radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.9) 0%, rgba(124,58,237,0.5) 25%, rgba(124,58,237,0.2) 45%, transparent 60%),
linear-gradient(to bottom, #1a0833 0%, #000 100%);
z-index:0;
}

.bg-zebra{
position:absolute;
inset:-25%;
z-index:1;
opacity:0.35;
mix-blend-mode:overlay;
transform:rotate(35deg) scale(1.4);
background-size:cover;
}

.bg-glow{
position:absolute;
top:-120px;
left:50%;
transform:translateX(-50%);
width:900px;
height:500px;
background:radial-gradient(ellipse at center, rgba(124,58,237,0.5), transparent);
filter:blur(40px);
z-index:2;
}

.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.06;
z-index:3;
}

/* TITLE BLOCK */
.titleWrap{
position:absolute;
top:70px;
width:100%;
text-align:center;
z-index:10;
}

.title{
font-family:'Oswald', sans-serif;
font-size:64px;
font-weight:700;
white-space:nowrap;
}

.subtitle{
font-family:'Oswald', sans-serif;
font-size:32px;
opacity:0.9;
}

/* PLAYERS */
.players{
position:absolute;
bottom:160px;
width:100%;
display:flex;
justify-content:center;
align-items:flex-end;
gap:40px;
z-index:10;
}

/* CARD */
.card{
width:240px;
height:420px;
position:relative;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
}

/* PLAYER */
.player{
position:absolute;
bottom:120px;
height:300px;
z-index:1;
}

/* GRADIENT FADE */
.card::after{
content:"";
position:absolute;
bottom:120px;
width:100%;
height:120px;
background:linear-gradient(to top, #000, transparent);
z-index:2;
}

/* LOGO */
.logoBox{
position:absolute;
bottom:150px;
width:50px;
height:50px;
background:rgba(0,0,0,0.6);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
z-index:3;
}

.logoBox img{
width:30px;
}

/* NAME */
.name{
position:absolute;
bottom:125px; /* було 110 → підняли */
font-size:20px;
font-weight:800;
z-index:3;
}

/* RATING BLOCK */
.ratingBox{
width:100%;
height:110px;
background:linear-gradient(180deg, #7c3aed, #4c1d95);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:4;
}

/* RATING NUMBER */
.rating{
font-size:56px;
font-weight:800;
line-height:1;
}

/* LABEL */
.ratingLabel{
font-size:16px;
opacity:0.8;
}

/* CENTER SCALE */
.card.center{
transform:scale(1.1);
z-index:5;
}

/* FOOTER */
.footer{
position:absolute;
bottom:15px;
width:100%;
display:flex;
justify-content:center;
gap:6px;
opacity:0.7;
font-size:14px;
z-index:10;
}

.footer img{
width:16px;
filter:invert(1);
}
</style>
</head>

<body>

<div class="bg-gradient"></div>
<div class="bg-zebra"></div>
<div class="bg-glow"></div>
<div class="noise"></div>

<div class="titleWrap">
  <div class="title">{{TITLE}}</div>
  <div class="subtitle">{{SUBTITLE}}</div>
</div>

<div class="players">

  <div class="card">
    <img class="player" src="{{P1_IMG}}">
    <div class="logoBox"><img src="{{P1_LOGO}}"></div>
    <div class="name">{{P1_NAME}}</div>

    <div class="ratingBox">
      <div class="rating">{{P1_RATING}}</div>
      <div class="ratingLabel">RATING 3.0</div>
    </div>
  </div>

  <div class="card center">
    <img class="player" src="{{P2_IMG}}">
    <div class="logoBox"><img src="{{P2_LOGO}}"></div>
    <div class="name">{{P2_NAME}}</div>

    <div class="ratingBox">
      <div class="rating">{{P2_RATING}}</div>
      <div class="ratingLabel">RATING 3.0</div>
    </div>
  </div>

  <div class="card">
    <img class="player" src="{{P3_IMG}}">
    <div class="logoBox"><img src="{{P3_LOGO}}"></div>
    <div class="name">{{P3_NAME}}</div>

    <div class="ratingBox">
      <div class="rating">{{P3_RATING}}</div>
      <div class="ratingLabel">RATING 3.0</div>
    </div>
  </div>

</div>

<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
