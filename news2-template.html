<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* затемнення як в news */
.fadeTop{
position:absolute;
top:0;
width:100%;
height:30%;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

.fadeBottom{
position:absolute;
bottom:0;
width:100%;
height:75%;
background:linear-gradient(to top, rgba(0,0,0,0.98), transparent);
}

.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.15;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* layout */
.wrapper{
position:absolute;
width:100%;
height:100%;
display:flex;
}

/* ліва частина */
.left{
width:55%;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px 60px;
}

/* лапки */
.quoteMark{
font-size:70px;
color:#a855f7;
margin-bottom:20px;
}

/* текст */
.text{
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.25;
text-transform:uppercase;
color:white;
font-style:italic;
}

/* автор */
.author{
margin-top:30px;
font-size:22px;
font-weight:800;
color:#a855f7;
letter-spacing:1px;
}

/* права частина */
.right{
width:45%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* фото */
.right img{
width:320px;
height:500px;
object-fit:cover;
}

/* 🔥 фіолетовий glow (правий нижній кут) */
.purpleGlow{
position:absolute;
bottom:0;
right:0;

width:260px;
height:260px;

background:radial-gradient(circle, rgba(168,85,247,0.9) 0%, transparent 70%);
filter:blur(60px);

pointer-events:none;
}

/* tg */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="fadeTop"></div>
<div class="fadeBottom"></div>
<div class="grain"></div>

<div class="wrapper">

  <div class="left">
    <div class="quoteMark">“</div>
    <div class="text">{{TEXT}}</div>
    <div class="author">— {{AUTHOR}}</div>
  </div>

  <div class="right">
    <img src="{{IMAGE}}">
    <div class="purpleGlow"></div>
  </div>

</div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
