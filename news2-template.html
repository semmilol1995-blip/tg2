<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* ❌ ПРИБРАЛИ верхній fade */
.fadeTop{
display:none;
}

/* ✅ ТІЛЬКИ зліва → направо */
.fadeBottom{
position:absolute;
left:0;
top:0;

width:65%;
height:100%;

background:linear-gradient(to right, rgba(0,0,0,0.95), transparent);
z-index:1;
}

/* grain */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.15;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
z-index:2;
}

/* 💜 GLOW В ЛІВОМУ ВЕРХНЬОМУ */
.purpleGlow{
position:absolute;
top:-80px;
left:-80px;

width:300px;
height:300px;

background:radial-gradient(circle, rgba(168,85,247,0.9) 0%, transparent 70%);
filter:blur(80px);

pointer-events:none;
z-index:3;
}

/* layout */
.wrapper{
position:absolute;
width:100%;
height:100%;
display:flex;
z-index:4;
}

/* ліва */
.left{
width:55%;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px 60px;
}

/* 🔥 ЛАПКИ (БЕЗ border-radius) */
.quoteMark{
display:inline-flex;
align-items:center;
justify-content:center;

background:#a855f7;
color:white;

font-size:28px;
font-weight:900;

padding:6px 16px;

border-radius:0; /* ключ */

letter-spacing:2px;

width:auto;
max-width:max-content;
margin-bottom:20px;

align-self:flex-start;
}

/* текст */
.text{
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.25;
text-transform:uppercase;
color:white;
font-style:italic;
}

/* автор */
.author{
margin-top:30px;
font-size:22px;
font-weight:800;
color:#a855f7;
letter-spacing:1px;
}

/* права зона */
.right{
width:45%;
position:relative;
}

/* tg */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
z-index:5;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="fadeBottom"></div>
<div class="grain"></div>
<div class="purpleGlow"></div>

<div class="wrapper">

  <div class="left">
    <div class="quoteMark">“”</div>
    <div class="text">{{TEXT}}</div>
    <div class="author">— {{AUTHOR}}</div>
  </div>

  <div class="right"></div>

</div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
