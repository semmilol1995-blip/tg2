<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Result</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
color:white;
overflow:hidden;
position:relative;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.55);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.15),rgba(0,0,0,0.85));
}

.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
}

/* HEADER */
.header{
position:absolute;
top:42px;
width:100%;
text-align:center;
font-weight:800;
font-size:26px;
letter-spacing:2px;
}

/* MATCH RESULT (LEFT BLOCK) */
.title{
position:absolute;
left:70px;
top:230px;
font-family:'Bebas Neue', sans-serif;
font-size:150px;
line-height:120px;
letter-spacing:2px;
}

/* VS TEXT */
.sub{
position:absolute;
left:70px;
top:440px;
font-size:16px;
opacity:0.6;
letter-spacing:2px;
}

/* RIGHT SIDE (MAIN BLOCK) */
.main{
position:absolute;
top:310px;
right:80px;
display:flex;
align-items:center;
gap:35px;
}

/* LOGO BLOCK */
.logoBox{
width:95px;
height:95px;
border-radius:10px;
background:linear-gradient(145deg,#0b1220,#111827);
border:1px solid rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 25px rgba(124,58,237,0.15);
}

.logoBox img{
max-width:75%;
max-height:75%;
object-fit:contain;
}

/* SCORE */
.score{
font-size:70px;
font-weight:900;
letter-spacing:2px;
}

/* INFO UNDER SCORE */
.info{
position:absolute;
top:410px;
right:180px;
display:flex;
gap:30px;
font-size:13px;
opacity:0.7;
letter-spacing:2px;
}

/* MAPS */
.maps{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
}

/* MAP CARD */
.map{
width:180px;
height:100px;
border-radius:8px;
overflow:hidden;
position:relative;
background:#111;
}

/* BG */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* GRADIENT */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}

/* TEXT */
.mapScore{
position:absolute;
top:8px;
left:10px;
font-size:20px;
font-weight:900;
z-index:2;
}

.mapName{
position:absolute;
bottom:8px;
left:10px;
font-size:13px;
font-weight:800;
z-index:2;
}

/* WIN ICON */
.winIcon{
position:absolute;
bottom:8px;
right:10px;
width:20px;
z-index:2;
}

/* STATES */
.map.win1{
box-shadow:0 0 15px rgba(34,197,94,0.9);
}

.map.win2{
box-shadow:0 0 15px rgba(59,130,246,0.9);
}

.map.disabled{
opacity:0.75;
filter:grayscale(0.4);
}

/* FOOTER */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-weight:700;
opacity:0.9;
}

.footer img{
width:18px;
vertical-align:middle;
margin-right:6px;
filter:invert(1);
}
</style>
</head>

<body>

<img class="bg" src="{bg}">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{tournament}</div>

<div class="title">MATCH<br>RESULT</div>
<div class="sub">{team1} vs {team2}</div>

<div class="main">
<div class="logoBox">
<img src="{team1_logo}">
</div>

<div class="score">{score}</div>

<div class="logoBox">
<img src="{team2_logo}">
</div>
</div>

<div class="info">
<div>{stage}</div>
<div>{format}</div>
</div>

<div class="maps {boClass}">
{maps}
</div>

<div class="footer">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
t.me/zbr4_cast
</div>

</body>
</html>
