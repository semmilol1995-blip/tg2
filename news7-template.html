<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:#000;
font-family:'Inter', sans-serif;
color:white;
overflow:hidden;
position:relative;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.55);
z-index:0;
}

/* DARK OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 60%);
z-index:1;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:26px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* LEFT TITLE */
.title{
position:absolute;
left:60px;
top:250px;
font-family:'Bebas Neue', sans-serif;
font-size:150px;
line-height:115px;
z-index:5;
}

/* VS TEXT */
.vs{
position:absolute;
left:60px;
top:460px;
font-size:16px;
opacity:0.7;
letter-spacing:2px;
z-index:5;
}

/* RIGHT BLOCK */
.right{
position:absolute;
top:360px;
right:120px;
display:flex;
align-items:center;
gap:30px;
z-index:5;
}

/* LOGO */
.logoBox{
width:90px;
height:90px;
border-radius:8px;
background:#0b1220;
border:1px solid rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
}

.logoBox img{
max-width:70%;
max-height:70%;
object-fit:contain;
}

/* SCORE */
.score{
font-size:70px;
font-weight:900;
}

/* INFO */
.info{
position:absolute;
top:460px;
right:160px;
display:flex;
gap:25px;
font-size:13px;
opacity:0.7;
letter-spacing:2px;
z-index:5;
}

/* MAPS */
.maps{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:5;
}

/* MAP CARD */
.map{
width:180px;
height:100px;
position:relative;
border-radius:8px;
overflow:hidden;
background:#111;
}

/* MAP IMAGE */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* GRADIENT */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
z-index:1;
}

/* TEXT */
.mapScore{
position:absolute;
top:8px;
left:10px;
font-weight:900;
font-size:20px;
z-index:2;
}

.mapName{
position:absolute;
bottom:8px;
left:10px;
font-size:13px;
font-weight:800;
z-index:2;
}

.winIcon{
position:absolute;
bottom:8px;
right:10px;
width:20px;
z-index:2;
}

/* STATES */
.map.hidden{
display:none;
}

.map.disabled{
opacity:0.75;
filter:grayscale(0.4);
}

.map.win1{
box-shadow:0 0 15px rgba(34,197,94,0.9);
}

.map.win2{
box-shadow:0 0 15px rgba(59,130,246,0.9);
}

/* FOOTER */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.9;
z-index:5;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<img class="bg" src="{bg}">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{tournament}</div>

<div class="title">
MATCH<br>RESULT
</div>

<div class="vs">
{team1} vs {team2}
</div>

<div class="right">
<div class="logoBox">
<img src="{team1_logo}">
</div>

<div class="score">{score}</div>

<div class="logoBox">
<img src="{team2_logo}">
</div>
</div>

<div class="info">
<div>{stage}</div>
<div>{format}</div>
</div>

<div class="maps {boClass}">
{maps}
</div>

<div class="footer">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
t.me/zbr4_cast
</div>

</body>
</html>
