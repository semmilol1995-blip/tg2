<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
position:relative;
color:white;
}

/* BACKGROUND */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.55);
z-index:0;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,rgba(0,0,0,0.75),rgba(0,0,0,0.2));
z-index:1;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:26px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* MATCH RESULT */
.matchTitle{
position:absolute;
left:60px;
top:240px;
font-family:'Bebas Neue', sans-serif;
font-size:140px;
line-height:110px;
z-index:5;
}

/* VS */
.vs{
position:absolute;
left:60px;
top:440px;
font-size:16px;
opacity:0.7;
letter-spacing:2px;
z-index:5;
}

/* RIGHT SIDE BLOCK */
.center{
position:absolute;
top:360px;
right:120px;
z-index:5;
}

/* TEAMS */
.teams{
display:flex;
align-items:center;
gap:30px;
}

/* TEAM */
.team{
text-align:center;
}

/* LOGO */
.team img{
width:90px;
height:90px;
object-fit:contain;
padding:10px;
background:#0b1220;
border:2px solid #fff;
}

/* SCORE */
.score{
font-size:70px;
font-weight:900;
}

/* INFO */
.info{
margin-top:12px;
display:flex;
gap:25px;
font-size:13px;
opacity:0.7;
letter-spacing:2px;
justify-content:center;
}

/* MAPS WRAP */
.maps{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:5;
}

/* BO5 FIX */
.maps.bo5 .map{
width:140px;
height:95px;
}

/* MAP CARD */
.map{
width:180px;
height:100px;
position:relative;
overflow:hidden;
border-radius:6px;
background:#111;
}

/* MAP IMAGE */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* GRADIENT */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
z-index:1;
}

/* TEXT */
.mapScore{
position:absolute;
top:8px;
left:10px;
font-weight:900;
font-size:20px;
z-index:2;
}

.mapName{
position:absolute;
bottom:8px;
left:10px;
font-size:13px;
font-weight:800;
z-index:2;
}

.winIcon{
position:absolute;
bottom:8px;
right:10px;
width:20px;
z-index:2;
}
/* STATES */

/* HIDE */
.map.hidden{
display:none;
}

/* NOT PLAYED */
.map.disabled{
opacity:0.75;
filter:grayscale(0.4);
}

/* WIN */
.map.win1{
box-shadow:0 0 15px rgba(34,197,94,0.9);
}

.map.win2{
box-shadow:0 0 15px rgba(59,130,246,0.9);
}

/* FOOTER */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.9;
z-index:5;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<img class="bg" src="{bg}">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{tournament}</div>

<div class="matchTitle">
MATCH<br>RESULT
</div>

<div class="vs">
{team1} vs {team2}
</div>

<div class="center">

<div class="teams">

<div class="team">
<img src="{team1_logo}">
</div>

<div class="score">{score}</div>

<div class="team">
<img src="{team2_logo}">
</div>

</div>

<div class="info">
<div>{stage}</div>
<div>{format}</div>
</div>

</div>

<div class="maps {boClass}">
{maps}
</div>

<div class="footer">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
t.me/zbr4_cast
</div>

</body>
</html>
