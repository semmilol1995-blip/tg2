<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
width:900px;
height:900px;
font-family:'Inter',sans-serif;
background:#000;
position:relative;
color:#fff;
overflow:hidden;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(4px) brightness(0.65);
}

/* LEFT DARK ZONE (як у рефі) */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.6) 45%,rgba(0,0,0,0.2) 100%);
}

/* HEADER */
.header{
position:absolute;
top:36px;
width:100%;
text-align:center;
font-size:24px;
font-weight:800;
letter-spacing:2px;
}

/* MATCH RESULT */
.matchTitle{
position:absolute;
left:70px;
top:250px;
font-size:110px;
font-weight:900;
line-height:0.9;
letter-spacing:-2px;
}

/* VS */
.vs{
position:absolute;
left:70px;
top:520px;
font-size:14px;
opacity:0.7;
letter-spacing:2px;
}

/* CENTER PANEL */
.center{
position:absolute;
top:360px;
left:520px;
display:flex;
align-items:center;
gap:40px;
}

/* TEAM LOGO BOX */
.teamBox{
width:90px;
height:90px;
background:#0f1722;
display:flex;
align-items:center;
justify-content:center;
border-radius:4px;
}

.teamBox img{
max-width:70%;
max-height:70%;
object-fit:contain;
}

/* SCORE */
.score{
font-size:72px;
font-weight:900;
letter-spacing:2px;
}

/* INFO */
.info{
position:absolute;
top:460px;
left:520px;
display:flex;
gap:40px;
font-size:13px;
letter-spacing:2px;
opacity:0.75;
}

/* MAP STRIP */
.maps{
position:absolute;
bottom:110px;
left:70px;
display:flex;
gap:14px;
}

/* BO5 */
.maps.bo5 .map{
width:150px;
}

/* MAP */
.map{
width:200px;
height:72px;
background:#121c28;
border-radius:6px;
overflow:hidden;
position:relative;
}

/* MAP IMAGE */
.map img.bgMap{
position:absolute;
right:0;
width:70%;
height:100%;
object-fit:cover;
opacity:0.9;
}

/* LEFT BLOCK */
.mapLeft{
position:absolute;
left:0;
top:0;
bottom:0;
width:55%;
padding:10px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* SCORE */
.mapScore{
font-size:18px;
font-weight:900;
}

/* NAME */
.mapName{
font-size:12px;
opacity:0.7;
margin-top:2px;
}

/* WIN ICON */
.winIcon{
position:absolute;
right:8px;
bottom:8px;
width:18px;
height:18px;
object-fit:contain;
}

/* STATES */
.map.hidden{display:none;}

.map.disabled{
opacity:0.6;
}

/* FOOTER */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:14px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
opacity:0.9;
}

.footer img{
width:16px;
filter:invert(1);
}

</style>
</head>

<body>

<img class="bg" src="{{IMAGE}}">
<div class="overlay"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="matchTitle">
MATCH<br>RESULT
</div>

<div class="vs">
{{TEAM1}} X {{TEAM2}}
</div>

<!-- CENTER -->
<div class="center">

  <div class="teamBox">
    <img src="{{TEAM1_LOGO}}">
  </div>

  <div class="score">
    {{SCORE1}}:{{SCORE2}}
  </div>

  <div class="teamBox">
    <img src="{{TEAM2_LOGO}}">
  </div>

</div>

<!-- INFO -->
<div class="info">
  <div>{{ROUND}}</div>
  <div>{{FORMAT}}</div>
</div>

<!-- MAPS -->
<div class="maps {{FORMAT_CLASS}}">

  <div class="map {{MAP1_CLASS}}">
    <img class="bgMap" src="{{MAP1_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP1_SCORE}}</div>
      <div class="mapName">{{MAP1_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP1_WINNER}}">
  </div>

  <div class="map {{MAP2_CLASS}}">
    <img class="bgMap" src="{{MAP2_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP2_SCORE}}</div>
      <div class="mapName">{{MAP2_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP2_WINNER}}">
  </div>

  <div class="map {{MAP3_CLASS}}">
    <img class="bgMap" src="{{MAP3_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP3_SCORE}}</div>
      <div class="mapName">{{MAP3_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP3_WINNER}}">
  </div>

  <div class="map {{MAP4_CLASS}}">
    <img class="bgMap" src="{{MAP4_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP4_SCORE}}</div>
      <div class="mapName">{{MAP4_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP4_WINNER}}">
  </div>

  <div class="map {{MAP5_CLASS}}">
    <img class="bgMap" src="{{MAP5_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP5_SCORE}}</div>
      <div class="mapName">{{MAP5_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP5_WINNER}}">
  </div>

</div>

<div class="footer">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  t.me/zbr4_cast
</div>

</body>
</html>
