<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
position:relative;
color:white;
}

/* BACKGROUND */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.55);
z-index:0;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.2),rgba(0,0,0,0.85));
z-index:1;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* HEADER (НЕ ЧІПАЄМО) */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* MATCH LEFT BLOCK */
.matchBlock{
position:absolute;
left:70px;
top:200px;
z-index:5;
}

.matchTitle{
font-family:'Anton', sans-serif;
font-size:120px;
line-height:0.82;
letter-spacing:1px;
}

.matchTeams{
margin-top:24px;
font-size:18px;
opacity:0.65;
letter-spacing:2px;
font-weight:500;
}

/* RIGHT SCORE BLOCK */
.scoreBlock{
position:absolute;
right:90px;
top:240px;
display:flex;
align-items:center;
gap:40px;
z-index:5;
}

/* LOGO BOX */
.teamLogo{
width:90px;
height:90px;
border:2px solid rgba(255,255,255,0.9);
display:flex;
align-items:center;
justify-content:center;
background:#0b1220;
}

.teamLogo img{
max-width:70px;
max-height:70px;
object-fit:contain;
}

/* SCORE */
.score{
font-family:'Anton', sans-serif;
font-size:100px;
letter-spacing:2px;
}

/* META */
.meta{
position:absolute;
right:90px;
top:380px;
display:flex;
width:320px;
justify-content:space-between;
font-size:13px;
letter-spacing:2px;
opacity:0.7;
z-index:5;
}

/* MAPS WRAP */
.mapsWrap{
position:absolute;
left:50%;
top:600px;
transform:translateX(-50%);
display:flex;
justify-content:center;
align-items:center;
z-index:5;
}

/* MAPS */
.maps{
display:flex;
gap:20px;
}

/* BO5 */
.maps.bo5 .map{
width:140px;
height:95px;
}

/* MAP CARD */
.map{
width:180px;
height:100px;
position:relative;
overflow:hidden;
border-radius:6px;
background:#111;
}

/* IMAGE */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* GRADIENT */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
z-index:1;
}

/* TEXT */
.mapScore{
position:absolute;
top:8px;
left:10px;
font-weight:900;
font-size:20px;
z-index:2;
}

.mapName{
position:absolute;
bottom:8px;
left:10px;
font-size:13px;
font-weight:800;
z-index:2;
}

/* WIN ICON */
.winIcon{
position:absolute;
bottom:8px;
right:10px;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
z-index:2;
}

.winIcon img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* STATES */

.map.hidden{
display:none;
}

.map.disabled{
opacity:0.4;
filter:grayscale(1);
}

.map.win1{
box-shadow:0 0 15px rgba(34,197,94,0.9);
}

.map.win2{
box-shadow:0 0 15px rgba(59,130,246,0.9);
}

/* FOOTER (НЕ ЧІПАЄМО) */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.85;
z-index:5;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<img src="{{PLAYER_IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{{TOURNAMENT}}</div>

<!-- MATCH LEFT -->
<div class="matchBlock">
  <div class="matchTitle">
    MATCH<br>RESULT
  </div>
  <div class="matchTeams">
    {{TEAM1}} vs {{TEAM2}}
  </div>
</div>

<!-- RIGHT SCORE -->
<div class="scoreBlock">
  <div class="teamLogo">
    <img src="{{TEAM1_LOGO}}">
  </div>

  <div class="score">{{SCORE1}}:{{SCORE2}}</div>

  <div class="teamLogo">
    <img src="{{TEAM2_LOGO}}">
  </div>
</div>

<!-- META -->
<div class="meta">
  <div class="round">{{ROUND}}</div>
  <div class="format">{{FORMAT}}</div>
</div>

<!-- MAPS -->
<div class="mapsWrap">
  <div class="maps {{FORMAT_CLASS}}">

    <div class="map {{MAP1_CLASS}}">
      <img class="bgMap" src="{{MAP1_IMAGE}}">
      <div class="mapScore">{{MAP1_SCORE}}</div>
      <div class="mapName">{{MAP1_NAME}}</div>
      <div class="winIcon"><img src="{{MAP1_WINNER}}"></div>
    </div>

    <div class="map {{MAP2_CLASS}}">
      <img class="bgMap" src="{{MAP2_IMAGE}}">
      <div class="mapScore">{{MAP2_SCORE}}</div>
      <div class="mapName">{{MAP2_NAME}}</div>
      <div class="winIcon"><img src="{{MAP2_WINNER}}"></div>
    </div>

    <div class="map {{MAP3_CLASS}}">
      <img class="bgMap" src="{{MAP3_IMAGE}}">
      <div class="mapScore">{{MAP3_SCORE}}</div>
      <div class="mapName">{{MAP3_NAME}}</div>
      <div class="winIcon"><img src="{{MAP3_WINNER}}"></div>
    </div>

    <div class="map {{MAP4_CLASS}}">
      <img class="bgMap" src="{{MAP4_IMAGE}}">
      <div class="mapScore">{{MAP4_SCORE}}</div>
      <div class="mapName">{{MAP4_NAME}}</div>
      <div class="winIcon"><img src="{{MAP4_WINNER}}"></div>
    </div>

    <div class="map {{MAP5_CLASS}}">
      <img class="bgMap" src="{{MAP5_IMAGE}}">
      <div class="mapScore">{{MAP5_SCORE}}</div>
      <div class="mapName">{{MAP5_NAME}}</div>
      <div class="winIcon"><img src="{{MAP5_WINNER}}"></div>
    </div>

  </div>
</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
