<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
position:relative;
color:white;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(4px) brightness(0.75);
z-index:0;
}

/* LEFT GRADIENT */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,
rgba(0,0,0,0.8) 0%,
rgba(0,0,0,0.55) 35%,
rgba(0,0,0,0.2) 70%,
rgba(0,0,0,0.05) 100%);
z-index:1;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* HEADER */
.header{
position:absolute;
top:35px;
width:100%;
text-align:center;
font-size:26px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* MATCH RESULT */
.matchTitle{
position:absolute;
left:70px;
top:240px;
font-size:115px;
line-height:95px;
font-weight:900;
z-index:5;
}

.matchSub{
position:absolute;
left:75px;
top:430px;
font-size:14px;
letter-spacing:2px;
opacity:0.7;
z-index:5;
}

/* CENTER */
.center{
position:absolute;
top:50%;
left:62%;
transform:translate(-50%,-50%);
z-index:5;
}

/* SCORE ROW */
.scoreRow{
display:flex;
align-items:center;
gap:40px;
}

/* TEAM */
.teamBox{
display:flex;
flex-direction:column;
align-items:center;
}

.teamLogo{
width:90px;
height:90px;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

.teamLogo img{
max-width:80%;
max-height:80%;
width:auto;
height:auto;
object-fit:contain;
}

/* SCORE */
.score{
font-size:110px;
font-weight:900;
}

/* META */
.meta{
margin-top:15px;
display:flex;
gap:40px;
font-size:13px;
opacity:0.85;
}

/* MAPS */
.mapsWrap{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
z-index:5;
}

.maps{
display:flex;
gap:18px;
}

/* BO5 */
.maps.bo5 .map{
width:140px;
height:90px;
}

/* MAP */
.map{
width:180px;
height:95px;
border-radius:6px;
overflow:hidden;
position:relative;
}

/* IMAGE */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* DARK */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}

/* TEXT */
.mapScore{
position:absolute;
top:6px;
left:10px;
font-weight:900;
z-index:2;
}

.mapName{
position:absolute;
bottom:6px;
left:10px;
font-size:12px;
z-index:2;
}

/* WIN ICON */
.winIcon{
position:absolute;
bottom:6px;
right:8px;
width:24px;
height:24px;
display:flex;
align-items:center;
justify-content:center;
z-index:2;
}

.winIcon img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* STATES */
.map.win1{
box-shadow:0 0 12px #22c55e;
}

.map.win2{
box-shadow:0 0 12px #3b82f6;
}

.map.disabled{
opacity:0.75;
}

.map.hidden{
display:none;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
opacity:0.8;
z-index:5;
}
</style>
</head>

<body>

<img src="{{PLAYER_IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{{TOURNAMENT}}</div>

<!-- LEFT -->
<div class="matchTitle">
MATCH<br>RESULT
</div>

<div class="matchSub">
{{TEAM1}} VS {{TEAM2}}
</div>

<!-- CENTER -->
<div class="center">

<div class="scoreRow">

<div class="teamBox">
<div class="teamLogo">
<img src="{{TEAM1_LOGO}}">
</div>
</div>

<div class="score">{{SCORE1}} - {{SCORE2}}</div>

<div class="teamBox">
<div class="teamLogo">
<img src="{{TEAM2_LOGO}}">
</div>
</div>

</div>

<div class="meta">
<div>{{ROUND}}</div>
<div>{{FORMAT}}</div>
</div>

</div>

<!-- MAPS -->
<div class="mapsWrap">
<div class="maps {{FORMAT_CLASS}}">

<div class="map {{MAP1_CLASS}}">
<img class="bgMap" src="{{MAP1_IMAGE}}">
<div class="mapScore">{{MAP1_SCORE}}</div>
<div class="mapName">{{MAP1_NAME}}</div>
<div class="winIcon"><img src="{{MAP1_WINNER}}"></div>
</div>

<div class="map {{MAP2_CLASS}}">
<img class="bgMap" src="{{MAP2_IMAGE}}">
<div class="mapScore">{{MAP2_SCORE}}</div>
<div class="mapName">{{MAP2_NAME}}</div>
<div class="winIcon"><img src="{{MAP2_WINNER}}"></div>
</div>

<div class="map {{MAP3_CLASS}}">
<img class="bgMap" src="{{MAP3_IMAGE}}">
<div class="mapScore">{{MAP3_SCORE}}</div>
<div class="mapName">{{MAP3_NAME}}</div>
<div class="winIcon"><img src="{{MAP3_WINNER}}"></div>
</div>

<div class="map {{MAP4_CLASS}}">
<img class="bgMap" src="{{MAP4_IMAGE}}">
<div class="mapScore">{{MAP4_SCORE}}</div>
<div class="mapName">{{MAP4_NAME}}</div>
<div class="winIcon"><img src="{{MAP4_WINNER}}"></div>
</div>

<div class="map {{MAP5_CLASS}}">
<img class="bgMap" src="{{MAP5_IMAGE}}">
<div class="mapScore">{{MAP5_SCORE}}</div>
<div class="mapName">{{MAP5_NAME}}</div>
<div class="winIcon"><img src="{{MAP5_WINNER}}"></div>
</div>

</div>
</div>

<div class="footer">
t.me/zbr4_cast
</div>

</body>
</html>
