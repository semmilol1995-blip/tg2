<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
width:900px;
height:900px;
font-family:'Inter',sans-serif;
background:#000;
position:relative;
color:#fff;
overflow:hidden;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.55);
}

/* ТВОЙ ГРАДІЄНТ */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,rgba(10,10,20,0.95) 0%,rgba(10,10,20,0.8) 45%,rgba(10,10,20,0.2) 100%);
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:26px;
font-weight:900;
letter-spacing:2px;
}

/* TITLE */
.matchTitle{
position:absolute;
left:70px;
top:260px;
font-size:120px;
font-weight:900;
line-height:0.9;
}

/* VS */
.vs{
position:absolute;
left:72px;
top:530px;
font-size:14px;
opacity:0.7;
letter-spacing:2px;
}

/* CENTER */
.center{
position:absolute;
top:360px;
left:500px;
display:flex;
align-items:center;
gap:36px;
}

/* TEAM BOX */
.teamBox{
width:95px;
height:95px;
background:#0b0f1a;
border:2px solid rgba(255,255,255,0.15);
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
box-shadow:0 0 25px rgba(124,58,237,0.2);
}

.teamBox img{
max-width:70%;
max-height:70%;
object-fit:contain;
}

/* SCORE */
.score{
font-size:78px;
font-weight:900;
letter-spacing:2px;
}

/* INFO */
.info{
position:absolute;
top:470px;
left:500px;
display:flex;
gap:30px;
font-size:13px;
letter-spacing:2px;
opacity:0.75;
}

/* MAPS */
.maps{
position:absolute;
bottom:120px;
left:70px;
display:flex;
gap:18px;
}

/* BO5 */
.maps.bo5 .map{
width:150px;
}

/* MAP */
.map{
width:190px;
height:95px;
position:relative;
border-radius:10px;
overflow:hidden;
background:#111;
}

/* MAP IMAGE */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* ТВОЙ OVERLAY */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.75),transparent);
z-index:1;
}

/* TEXT */
.mapScore{
position:absolute;
top:8px;
left:10px;
font-weight:900;
font-size:18px;
z-index:2;
}

.mapName{
position:absolute;
bottom:8px;
left:10px;
font-size:12px;
font-weight:800;
z-index:2;
}

/* WIN ICON */
.winIcon{
position:absolute;
bottom:8px;
right:10px;
width:18px;
height:18px;
z-index:2;
object-fit:contain;
}

/* STATES */
.map.hidden{display:none;}

.map.disabled{
opacity:0.75;
filter:grayscale(0.4);
}

/* WIN EFFECT (ТВОЙ GLOW) */
.map.win1{
box-shadow:0 0 18px rgba(34,197,94,0.8);
}

.map.win2{
box-shadow:0 0 18px rgba(59,130,246,0.8);
}

/* FOOTER */
.footer{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.9;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.footer img{
width:18px;
filter:invert(1);
}

</style>
</head>

<body>

<img class="bg" src="{{IMAGE}}">
<div class="overlay"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="matchTitle">
MATCH<br>RESULT
</div>

<div class="vs">
{{TEAM1}} X {{TEAM2}}
</div>

<!-- CENTER -->
<div class="center">

  <div class="teamBox">
    <img src="{{TEAM1_LOGO}}">
  </div>

  <div class="score">
    {{SCORE1}}:{{SCORE2}}
  </div>

  <div class="teamBox">
    <img src="{{TEAM2_LOGO}}">
  </div>

</div>

<!-- INFO -->
<div class="info">
  <div>{{ROUND}}</div>
  <div>{{FORMAT}}</div>
</div>

<!-- MAPS -->
<div class="maps {{FORMAT_CLASS}}">

  <div class="map {{MAP1_CLASS}}">
    <img class="bgMap" src="{{MAP1_IMAGE}}">
    <div class="mapScore">{{MAP1_SCORE}}</div>
    <div class="mapName">{{MAP1_NAME}}</div>
    <img class="winIcon" src="{{MAP1_WINNER}}">
  </div>

  <div class="map {{MAP2_CLASS}}">
    <img class="bgMap" src="{{MAP2_IMAGE}}">
    <div class="mapScore">{{MAP2_SCORE}}</div>
    <div class="mapName">{{MAP2_NAME}}</div>
    <img class="winIcon" src="{{MAP2_WINNER}}">
  </div>

  <div class="map {{MAP3_CLASS}}">
    <img class="bgMap" src="{{MAP3_IMAGE}}">
    <div class="mapScore">{{MAP3_SCORE}}</div>
    <div class="mapName">{{MAP3_NAME}}</div>
    <img class="winIcon" src="{{MAP3_WINNER}}">
  </div>

  <div class="map {{MAP4_CLASS}}">
    <img class="bgMap" src="{{MAP4_IMAGE}}">
    <div class="mapScore">{{MAP4_SCORE}}</div>
    <div class="mapName">{{MAP4_NAME}}</div>
    <img class="winIcon" src="{{MAP4_WINNER}}">
  </div>

  <div class="map {{MAP5_CLASS}}">
    <img class="bgMap" src="{{MAP5_IMAGE}}">
    <div class="mapScore">{{MAP5_SCORE}}</div>
    <div class="mapName">{{MAP5_NAME}}</div>
    <img class="winIcon" src="{{MAP5_WINNER}}">
  </div>

</div>

<div class="footer">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  t.me/zbr4_cast
</div>

</body>
</html>
