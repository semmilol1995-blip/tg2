<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
position:relative;
color:white;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.55);
z-index:0;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.2),rgba(0,0,0,0.85) 80%);
z-index:1;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:5;
}

.round{
opacity:0.7;
margin-bottom:10px;
}

.score{
font-size:120px;
font-weight:900;
}

.format{
margin-top:10px;
display:inline-block;
padding:6px 16px;
background:linear-gradient(90deg,#7c3aed,#3b82f6);
border-radius:4px;
font-weight:900;
}

/* TEAMS */
.teams{
position:absolute;
top:50%;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
transform:translateY(-50%);
padding:0 60px;
box-sizing:border-box;
z-index:5;
}

.team{
text-align:center;
}

.team img{
width:90px;
height:90px;
border:2px solid white;
padding:10px;
background:#000;
}

.teamName{
margin-top:10px;
font-weight:800;
}

/* MAPS */
.maps{
position:absolute;
bottom:80px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
z-index:5;
}

/* MAP CARD */
.map{
width:180px;
height:100px;
position:relative;
overflow:hidden;
border-radius:6px;
background:#111;
}

/* FULL BG */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* FADE */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

/* SCORE */
.mapScore{
position:absolute;
top:8px;
left:10px;
font-weight:900;
font-size:20px;
}
/* NAME */
.mapName{
position:absolute;
bottom:8px;
left:10px;
font-size:13px;
font-weight:800;
}

/* WINNER */
.winIcon{
position:absolute;
bottom:8px;
right:10px;
width:20px;
height:20px;
}

/* STATES */
.map.hidden{
display:none;
}

.map.disabled{
opacity:0.25;
filter:grayscale(1);
}

.map.win1{
box-shadow:0 0 15px rgba(34,197,94,0.9);
}

.map.win2{
box-shadow:0 0 15px rgba(59,130,246,0.9);
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.85;
z-index:5;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="center">
<div class="round">{{ROUND}}</div>
<div class="score">{{SCORE1}} - {{SCORE2}}</div>
<div class="format">{{FORMAT}}</div>
</div>

<div class="teams">

<div class="team">
<img src="{{TEAM1_LOGO}}">
<div class="teamName">{{TEAM1}}</div>
</div>

<div class="team">
<img src="{{TEAM2_LOGO}}">
<div class="teamName">{{TEAM2}}</div>
</div>

</div>

<div class="maps">

<div class="map {{MAP1_CLASS}}">
<img class="bgMap" src="{{MAP1_IMAGE}}">
<div class="mapScore">{{MAP1_SCORE}}</div>
<div class="mapName">{{MAP1_NAME}}</div>
<img class="winIcon" src="{{MAP1_WINNER}}">
</div>

<div class="map {{MAP2_CLASS}}">
<img class="bgMap" src="{{MAP2_IMAGE}}">
<div class="mapScore">{{MAP2_SCORE}}</div>
<div class="mapName">{{MAP2_NAME}}</div>
<img class="winIcon" src="{{MAP2_WINNER}}">
</div>

<div class="map {{MAP3_CLASS}}">
<img class="bgMap" src="{{MAP3_IMAGE}}">
<div class="mapScore">{{MAP3_SCORE}}</div>
<div class="mapName">{{MAP3_NAME}}</div>
<img class="winIcon" src="{{MAP3_WINNER}}">
</div>

<div class="map {{MAP4_CLASS}}">
<img class="bgMap" src="{{MAP4_IMAGE}}">
<div class="mapScore">{{MAP4_SCORE}}</div>
<div class="mapName">{{MAP4_NAME}}</div>
<img class="winIcon" src="{{MAP4_WINNER}}">
</div>

<div class="map {{MAP5_CLASS}}">
<img class="bgMap" src="{{MAP5_IMAGE}}">
<div class="mapScore">{{MAP5_SCORE}}</div>
<div class="mapName">{{MAP5_NAME}}</div>
<img class="winIcon" src="{{MAP5_WINNER}}">
</div>

</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
