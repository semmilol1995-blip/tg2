<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
position:relative;
color:white;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.6);
z-index:0;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0.2) 100%);
z-index:1;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* MATCH RESULT (лівий блок як реф) */
.matchTitle{
position:absolute;
left:70px;
top:250px;
font-size:120px;
font-weight:900;
line-height:0.9;
letter-spacing:-3px;
z-index:5;
}

/* VS */
.vsText{
position:absolute;
left:70px;
top:500px;
font-size:14px;
opacity:0.7;
z-index:5;
}

/* CENTER BLOCK (ГОЛОВНИЙ ФІКС) */
.center{
position:absolute;
top:380px;
left:600px;
display:flex;
align-items:center;
gap:40px;
transform:translateX(-50%);
z-index:5;
}

/* TEAM */
.team{
text-align:center;
}

/* LOGO FRAME */
.team img{
width:100px;
height:100px;
object-fit:contain;
border:2px solid white;
background:#000;
padding:12px;
}

/* SCORE */
.score{
font-size:100px;
font-weight:900;
display:flex;
align-items:center;
gap:20px;
}

/* INFO */
.info{
position:absolute;
top:520px;
left:600px;
transform:translateX(-50%);
display:flex;
gap:40px;
font-size:14px;
opacity:0.7;
z-index:5;
}

/* MAPS (ПОВЕРТАЄМО ТВІЙ СТИЛЬ) */
.maps{
position:absolute;
bottom:110px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
z-index:5;
}

/* BO5 */
.maps.bo5 .map{
width:135px;
}

/* MAP */
.map{
width:170px;
height:95px;
position:relative;
overflow:hidden;
border-radius:8px;
background:#111;
}

/* MAP IMG */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* GRADIENT */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
z-index:1;
}

/* TEXT */
.mapScore{
position:absolute;
top:6px;
left:8px;
font-size:18px;
font-weight:900;
z-index:2;
}

.mapName{
position:absolute;
bottom:6px;
left:8px;
font-size:12px;
font-weight:800;
z-index:2;
}

/* WIN */
.winIcon{
position:absolute;
bottom:6px;
right:8px;
width:22px;
height:22px;
object-fit:contain;
z-index:2;
}

/* STATES */
.map.hidden{ display:none; }

.map.disabled{
opacity:0.75;
filter:grayscale(0.3);
}

/* FOOTER */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.9;
z-index:5;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}

</style>
</head>

<body>

<img class="bg" src="{{IMAGE}}">
<div class="overlay"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="matchTitle">
MATCH<br>RESULT
</div>

<div class="vs">
{{TEAM1}} X {{TEAM2}}
</div>

<!-- CENTER -->
<div class="center">

  <div class="logoBox">
    <img src="{{TEAM1_LOGO}}">
  </div>

  <div class="score">
    {{SCORE1}}:{{SCORE2}}
  </div>

  <div class="logoBox">
    <img src="{{TEAM2_LOGO}}">
  </div>

</div>

<!-- INFO -->
<div class="info">
  <div>{{ROUND}}</div>
  <div>{{FORMAT}}</div>
</div>

<!-- MAPS -->
<div class="maps {{FORMAT_CLASS}}">

  <div class="map {{MAP1_CLASS}}">
    <img class="bgMap" src="{{MAP1_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP1_SCORE}}</div>
      <div class="mapName">{{MAP1_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP1_WINNER}}">
  </div>

  <div class="map {{MAP2_CLASS}}">
    <img class="bgMap" src="{{MAP2_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP2_SCORE}}</div>
      <div class="mapName">{{MAP2_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP2_WINNER}}">
  </div>

  <div class="map {{MAP3_CLASS}}">
    <img class="bgMap" src="{{MAP3_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP3_SCORE}}</div>
      <div class="mapName">{{MAP3_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP3_WINNER}}">
  </div>

  <div class="map {{MAP4_CLASS}}">
    <img class="bgMap" src="{{MAP4_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP4_SCORE}}</div>
      <div class="mapName">{{MAP4_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP4_WINNER}}">
  </div>

  <div class="map {{MAP5_CLASS}}">
    <img class="bgMap" src="{{MAP5_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP5_SCORE}}</div>
      <div class="mapName">{{MAP5_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP5_WINNER}}">
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  t.me/zbr4_cast
</div>

</body>
</html>
