<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
width:900px;
height:900px;
font-family:'Inter',sans-serif;
background:#000;
position:relative;
color:white;
overflow:hidden;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* DARK OVERLAY (як у рефі) */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0.2) 100%);
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:24px;
font-weight:800;
letter-spacing:2px;
}

/* MATCH RESULT */
.matchTitle{
position:absolute;
left:70px;
top:260px;
font-family:'Oswald',sans-serif;
font-size:110px;
line-height:0.9;
font-weight:700;
}

/* VS */
.vs{
position:absolute;
left:70px;
top:500px;
font-size:14px;
letter-spacing:2px;
opacity:0.7;
}

/* CENTER BLOCK */
.center{
position:absolute;
top:380px;
left:55%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:30px;
}

/* LOGO BOX */
.logoBox{
width:90px;
height:90px;
background:#0f1a26;
display:flex;
align-items:center;
justify-content:center;
}

.logoBox img{
max-width:70%;
max-height:70%;
object-fit:contain;
}

/* SCORE */
.score{
font-size:70px;
font-weight:900;
letter-spacing:2px;
}

/* INFO */
.info{
position:absolute;
top:470px;
left:55%;
transform:translateX(-50%);
display:flex;
gap:40px;
font-size:13px;
letter-spacing:2px;
opacity:0.8;
}

/* MAPS STRIP */
.maps{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
}

/* MAP */
.map{
width:200px;
height:70px;
background:#1b2a3a;
position:relative;
overflow:hidden;
}

/* BO5 */
.maps.bo5 .map{
width:150px;
}

/* MAP IMG */
.map img.bgMap{
position:absolute;
right:0;
width:70%;
height:100%;
object-fit:cover;
opacity:0.9;
}

/* LEFT INFO */
.mapLeft{
position:absolute;
left:0;
top:0;
bottom:0;
width:55%;
padding:8px;
box-sizing:border-box;
display:flex;
flex-direction:column;
justify-content:center;
}

/* SCORE */
.mapScore{
font-size:18px;
font-weight:900;
}

/* NAME */
.mapName{
font-size:12px;
opacity:0.7;
margin-top:2px;
}

/* WIN ICON */
.winIcon{
position:absolute;
right:6px;
bottom:6px;
width:18px;
height:18px;
object-fit:contain;
}

/* STATES */
.map.hidden{ display:none; }

.map.disabled{
opacity:0.6;
}

/* FOOTER */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:14px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.footer img{
width:16px;
filter:invert(1);
}

</style>
</head>

<body>

<img class="bg" src="{{IMAGE}}">
<div class="overlay"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="matchTitle">
MATCH<br>RESULT
</div>

<div class="vs">
{{TEAM1}} X {{TEAM2}}
</div>

<!-- CENTER -->
<div class="center">

  <div class="logoBox">
    <img src="{{TEAM1_LOGO}}">
  </div>

  <div class="score">
    {{SCORE1}}:{{SCORE2}}
  </div>

  <div class="logoBox">
    <img src="{{TEAM2_LOGO}}">
  </div>

</div>

<!-- INFO -->
<div class="info">
  <div>{{ROUND}}</div>
  <div>{{FORMAT}}</div>
</div>

<!-- MAPS -->
<div class="maps {{FORMAT_CLASS}}">

  <div class="map {{MAP1_CLASS}}">
    <img class="bgMap" src="{{MAP1_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP1_SCORE}}</div>
      <div class="mapName">{{MAP1_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP1_WINNER}}">
  </div>

  <div class="map {{MAP2_CLASS}}">
    <img class="bgMap" src="{{MAP2_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP2_SCORE}}</div>
      <div class="mapName">{{MAP2_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP2_WINNER}}">
  </div>

  <div class="map {{MAP3_CLASS}}">
    <img class="bgMap" src="{{MAP3_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP3_SCORE}}</div>
      <div class="mapName">{{MAP3_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP3_WINNER}}">
  </div>

  <div class="map {{MAP4_CLASS}}">
    <img class="bgMap" src="{{MAP4_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP4_SCORE}}</div>
      <div class="mapName">{{MAP4_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP4_WINNER}}">
  </div>

  <div class="map {{MAP5_CLASS}}">
    <img class="bgMap" src="{{MAP5_IMAGE}}">
    <div class="mapLeft">
      <div class="mapScore">{{MAP5_SCORE}}</div>
      <div class="mapName">{{MAP5_NAME}}</div>
    </div>
    <img class="winIcon" src="{{MAP5_WINNER}}">
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  t.me/zbr4_cast
</div>

</body>
</html>
