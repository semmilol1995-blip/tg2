<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
color:#fff;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.65);
z-index:0;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.15),rgba(0,0,0,0.85));
z-index:1;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* LEFT BIG TEXT */
.left{
position:absolute;
top:260px;
left:60px;
z-index:5;
}

.title{
font-size:120px;
font-weight:900;
line-height:0.82;
}

.subtitle{
margin-top:20px;
font-size:16px;
opacity:0.7;
letter-spacing:1px;
}

/* RIGHT SCORE BLOCK */
.scoreWrap{
position:absolute;
top:360px;
left:460px;
display:flex;
align-items:center;
gap:30px;
z-index:5;
}

/* TEAM BOX */
.teamBox{
width:110px;
height:110px;
border:2px solid #fff;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

.teamBox img{
max-width:75%;
max-height:75%;
object-fit:contain;
}

/* SCORE */
.score{
font-size:100px;
font-weight:900;
display:flex;
align-items:center;
gap:15px;
}

.score span{
display:inline-block;
}

/* INFO */
.info{
position:absolute;
top:510px;
left:520px;
display:flex;
gap:40px;
font-size:14px;
opacity:0.7;
z-index:5;
}

/* MAPS */
.maps{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:5;
}

/* BO5 FIX */
.maps.bo5 .map{
width:140px;
height:95px;
}

.map{
width:200px;
height:110px;
position:relative;
border-radius:6px;
overflow:hidden;
background:#111;
}

/* IMG */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

/* TEXT */
.mapScore{
position:absolute;
top:8px;
left:10px;
font-size:20px;
font-weight:900;
z-index:2;
}

.mapName{
position:absolute;
bottom:10px;
left:10px;
font-size:13px;
font-weight:800;
z-index:2;
}

/* UNDERLINE */
.map::before{
content:'';
position:absolute;
bottom:0;
left:0;
width:100%;
height:3px;
background:#38bdf8;
}

/* WIN ICON */
.winIcon{
position:absolute;
bottom:8px;
right:10px;
width:20px;
height:20px;
display:flex;
align-items:center;
justify-content:center;
}

.winIcon img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* STATES */
.map.hidden{display:none;}

.map.disabled{
opacity:0.8;
filter:grayscale(0.3);
}

.map.win1{
box-shadow:0 0 15px rgba(34,197,94,0.9);
}

.map.win2{
box-shadow:0 0 15px rgba(59,130,246,0.9);
}

/* FOOTER (НЕ ЧІПАЄМО) */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
opacity:0.8;
}

.footer img{
width:18px;
margin-right:6px;
filter:invert(1);
}
</style>
</head>

<body>

<img class="bg" src="{{IMAGE}}">
<div class="overlay"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="left">
<div class="title">MATCH<br>RESULT</div>
<div class="subtitle">{{TEAM1}} vs {{TEAM2}}</div>
</div>

<div class="scoreWrap">

<div class="teamBox">
<img src="{{TEAM1_LOGO}}">
</div>

<div class="score">
<span>{{SCORE1}}</span>
<span>-</span>
<span>{{SCORE2}}</span>
</div>

<div class="teamBox">
<img src="{{TEAM2_LOGO}}">
</div>

</div>

<div class="info">
<span>{{ROUND}}</span>
<span>{{FORMAT}}</span>
</div>

<div class="maps {{FORMAT_CLASS}}">

<div class="map {{MAP1_CLASS}}">
<img class="bgMap" src="{{MAP1_IMAGE}}">
<div class="mapScore">{{MAP1_SCORE}}</div>
<div class="mapName">{{MAP1_NAME}}</div>
<div class="winIcon"><img src="{{MAP1_WINNER}}"></div>
</div>

<div class="map {{MAP2_CLASS}}">
<img class="bgMap" src="{{MAP2_IMAGE}}">
<div class="mapScore">{{MAP2_SCORE}}</div>
<div class="mapName">{{MAP2_NAME}}</div>
<div class="winIcon"><img src="{{MAP2_WINNER}}"></div>
</div>

<div class="map {{MAP3_CLASS}}">
<img class="bgMap" src="{{MAP3_IMAGE}}">
<div class="mapScore">{{MAP3_SCORE}}</div>
<div class="mapName">{{MAP3_NAME}}</div>
<div class="winIcon"><img src="{{MAP3_WINNER}}"></div>
</div>

<div class="map {{MAP4_CLASS}}">
<img class="bgMap" src="{{MAP4_IMAGE}}">
<div class="mapScore">{{MAP4_SCORE}}</div>
<div class="mapName">{{MAP4_NAME}}</div>
<div class="winIcon"><img src="{{MAP4_WINNER}}"></div>
</div>

<div class="map {{MAP5_CLASS}}">
<img class="bgMap" src="{{MAP5_IMAGE}}">
<div class="mapScore">{{MAP5_SCORE}}</div>
<div class="mapName">{{MAP5_NAME}}</div>
<div class="winIcon"><img src="{{MAP5_WINNER}}"></div>
</div>

</div>

<div class="footer">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
t.me/zbr4_cast
</div>

</body>
</html>
