<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
position:relative;
color:white;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.55);
z-index:0;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.25),rgba(0,0,0,0.9));
z-index:1;
}

.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* WRAPPER */
.wrapper{
position:absolute;
left:80px;
right:80px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
z-index:5;
}

/* ROW2 */
.row2{
display:flex;
justify-content:space-between;
align-items:flex-end;
}

.leftBlock{
display:flex;
flex-direction:column;
width:50%;
}

/* MATCH */
.matchWrap{
width:100%;
}

.matchLine{
font-family:'Anton', sans-serif;
font-size:120px;
line-height:0.9;
display:block;
}

.matchTeams{
margin-top:12px;
font-size:18px;
opacity:0.65;
letter-spacing:2px;
}

/* RIGHT */
.rightBlock{
display:flex;
flex-direction:column;
width:50%;
align-items:flex-end;
}

/* WIDTH FIX */
.scoreRow,
.metaRow{
width:100%;
}

/* SCORE */
.scoreRow{
display:flex;
align-items:center;
justify-content:space-between;
}

.teamLogo{
width:92px;
height:92px;
border:2px solid rgba(255,255,255,0.9);
display:flex;
align-items:center;
justify-content:center;
background:#0b1220;
}

.teamLogo img{
max-width:68px;
max-height:68px;
object-fit:contain;
}

.score{
font-family:'Anton', sans-serif;
font-size:55px;
}

/* META */
.metaRow{
margin-top:12px;
display:flex;
justify-content:space-between;
font-size:14px;
letter-spacing:2px;
opacity:0.7;
}

/* MAPS */
.maps{
display:flex;
gap:20px;
width:100%;
}

/* MAP */
.map{
flex:1;
height:150px;
position:relative;
overflow:hidden;
background:#111;
}

/* BG */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* GRADIENT */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.8),transparent 60%);
z-index:1;
}

/* SCORE */
.mapScore{
position:absolute;
top:10px;
left:12px;
font-family:'Anton', sans-serif;
font-size:26px;
z-index:2;
}

/* WHITE BAR */
.mapName{
position:absolute;
bottom:0;
left:0;
width:100%;
height:42px;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding-left:12px;
z-index:2;
}

/* TEXT */
.mapName span{
font-family:'Anton', sans-serif;
font-size:26px;
color:#000;
}

/* LOGO (ІДЕАЛЬНО ЯК РЕФ) */
<!-- ЗАМІНИ ТІЛЬКИ ЦЕ -->

.winIcon{
height:100%;
width:50px;
background:#0b1220;

display:flex;
align-items:center;
justify-content:center; /* 🔥 центр по горизонталі */

flex-shrink:0; /* щоб не стискався */

margin-left:auto; /* відштовхує вправо, але не ламає центр */
}

.winIcon img{
display:block;
margin:auto; /* 🔥 гарант центр */
max-width:65%;
max-height:65%;
object-fit:contain;
}

/* STATES */
.map.hidden{display:none;}
.map.disabled{opacity:0.4;filter:grayscale(1);}
.map.win1{box-shadow:0 0 15px rgba(34,197,94,0.9);}
.map.win2{box-shadow:0 0 15px rgba(59,130,246,0.9);}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.85;
z-index:5;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<img src="{{PLAYER_IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="wrapper">

  <div class="row2">

    <div class="leftBlock">
      <div class="matchWrap">
        <span class="matchLine">MATCH</span>
        <span class="matchLine">RESULT</span>
      </div>

      <div class="matchTeams">
        {{TEAM1}} vs {{TEAM2}}
      </div>
    </div>

    <div class="rightBlock">

      <div class="scoreRow">
        <div class="teamLogo">
          <img src="{{TEAM1_LOGO}}">
        </div>

        <div class="score">{{SCORE1}}:{{SCORE2}}</div>

        <div class="teamLogo">
          <img src="{{TEAM2_LOGO}}">
        </div>
      </div>

      <div class="metaRow">
        <div>{{ROUND}}</div>
        <div>{{FORMAT}}</div>
      </div>

    </div>

  </div>

  <div class="maps {{FORMAT_CLASS}}">

    <div class="map {{MAP1_CLASS}}">
      <img class="bgMap" src="{{MAP1_IMAGE}}">
      <div class="mapScore">{{MAP1_SCORE}}</div>
      <div class="mapName">
        <span>{{MAP1_NAME}}</span>
        <div class="winIcon"><img src="{{MAP1_WINNER}}"></div>
      </div>
    </div>

    <div class="map {{MAP2_CLASS}}">
      <img class="bgMap" src="{{MAP2_IMAGE}}">
      <div class="mapScore">{{MAP2_SCORE}}</div>
      <div class="mapName">
        <span>{{MAP2_NAME}}</span>
        <div class="winIcon"><img src="{{MAP2_WINNER}}"></div>
      </div>
    </div>

    <div class="map {{MAP3_CLASS}}">
      <img class="bgMap" src="{{MAP3_IMAGE}}">
      <div class="mapScore">{{MAP3_SCORE}}</div>
      <div class="mapName">
        <span>{{MAP3_NAME}}</span>
        <div class="winIcon"><img src="{{MAP3_WINNER}}"></div>
      </div>
    </div>

    <div class="map {{MAP4_CLASS}}">
      <img class="bgMap" src="{{MAP4_IMAGE}}">
      <div class="mapScore">{{MAP4_SCORE}}</div>
      <div class="mapName">
        <span>{{MAP4_NAME}}</span>
        <div class="winIcon"><img src="{{MAP4_WINNER}}"></div>
      </div>
    </div>

    <div class="map {{MAP5_CLASS}}">
      <img class="bgMap" src="{{MAP5_IMAGE}}">
      <div class="mapScore">{{MAP5_SCORE}}</div>
      <div class="mapName">
        <span>{{MAP5_NAME}}</span>
        <div class="winIcon"><img src="{{MAP5_WINNER}}"></div>
      </div>
    </div>

  </div>

</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
