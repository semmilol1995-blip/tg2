<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ ТВОЙ ШРИФТ -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
background:#000;
overflow:hidden;
position:relative;
color:white;
}

/* BACKGROUND */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(6px) brightness(0.6);
z-index:0;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.2),rgba(0,0,0,0.85));
z-index:1;
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:2;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
z-index:5;
}

/* MATCH RESULT */
.matchTitle{
position:absolute;
top:240px;
left:80px;
font-size:115px;
font-weight:900;
line-height:0.9;
letter-spacing:-3px;
z-index:5;
}

/* VS TEXT */
.vsText{
position:absolute;
top:420px;
left:80px;
font-size:16px;
opacity:0.7;
z-index:5;
}

/* TEAMS + SCORE (ГОЛОВНИЙ ФІКС) */
.teams{
position:absolute;
top:400px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:60px;
z-index:5;
}

.team{
text-align:center;
}

/* ЛОГО В РАМЦІ */
.team img{
width:100px;
height:100px;
object-fit:contain;
border:2px solid white;
background:#000;
padding:12px;
}

/* SCORE */
.score{
font-size:95px;
font-weight:900;
display:flex;
align-items:center;
gap:20px;
}

/* ROUND + FORMAT */
.info{
position:absolute;
top:520px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:30px;
font-size:14px;
opacity:0.7;
z-index:5;
}

/* MAPS */
.maps{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
z-index:5;
}

.map{
width:170px;
height:95px;
position:relative;
border-radius:8px;
overflow:hidden;
}

/* BO5 */
.maps.bo5 .map{
width:135px;
}

/* MAP IMAGE */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* MAP GRADIENT */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

/* TEXT */
.mapScore{
position:absolute;
top:6px;
left:8px;
font-weight:900;
font-size:18px;
z-index:2;
}

.mapName{
position:absolute;
bottom:6px;
left:8px;
font-size:12px;
font-weight:800;
z-index:2;
}

/* WIN LOGO */
.winIcon{
position:absolute;
bottom:6px;
right:8px;
width:22px;
height:22px;
object-fit:contain;
}

/* DISABLED MAP */
.map.disabled{
opacity:0.8;
filter:grayscale(0.3);
}

/* HIDDEN */
.map.hidden{
display:none;
}

/* FOOTER */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.85;
z-index:5;
}

</style>
</head>

<body>

<img class="bg" src="{{IMAGE}}">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="matchTitle">MATCH<br>RESULT</div>
<div class="vsText">{{TEAM1}} vs {{TEAM2}}</div>

<!-- TEAMS + SCORE -->
<div class="teams">
  <div class="team">
    <img src="{{TEAM1_LOGO}}">
  </div>

  <div class="score">
    <span>{{SCORE1}}</span>
    <span>-</span>
    <span>{{SCORE2}}</span>
  </div>

  <div class="team">
    <img src="{{TEAM2_LOGO}}">
  </div>
</div>

<!-- INFO -->
<div class="info">
  <div>{{ROUND}}</div>
  <div>{{FORMAT}}</div>
</div>

<!-- MAPS -->
<div class="maps {{FORMAT_CLASS}}">
  <div class="map {{MAP1_CLASS}}">
    <img class="bgMap" src="{{MAP1_IMAGE}}">
    <div class="mapScore">{{MAP1_SCORE}}</div>
    <div class="mapName">{{MAP1_NAME}}</div>
    <img class="winIcon" src="{{MAP1_WINNER}}">
  </div>

  <div class="map {{MAP2_CLASS}}">
    <img class="bgMap" src="{{MAP2_IMAGE}}">
    <div class="mapScore">{{MAP2_SCORE}}</div>
    <div class="mapName">{{MAP2_NAME}}</div>
    <img class="winIcon" src="{{MAP2_WINNER}}">
  </div>

  <div class="map {{MAP3_CLASS}}">
    <img class="bgMap" src="{{MAP3_IMAGE}}">
    <div class="mapScore">{{MAP3_SCORE}}</div>
    <div class="mapName">{{MAP3_NAME}}</div>
    <img class="winIcon" src="{{MAP3_WINNER}}">
  </div>

  <div class="map {{MAP4_CLASS}}">
    <img class="bgMap" src="{{MAP4_IMAGE}}">
    <div class="mapScore">{{MAP4_SCORE}}</div>
    <div class="mapName">{{MAP4_NAME}}</div>
    <img class="winIcon" src="{{MAP4_WINNER}}">
  </div>

  <div class="map {{MAP5_CLASS}}">
    <img class="bgMap" src="{{MAP5_IMAGE}}">
    <div class="mapScore">{{MAP5_SCORE}}</div>
    <div class="mapName">{{MAP5_NAME}}</div>
    <img class="winIcon" src="{{MAP5_WINNER}}">
  </div>
</div>

<div class="footer">t.me/zbr4_cast</div>

</body>
</html>
