<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter',sans-serif;
color:#fff;
overflow:hidden;
position:relative;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(2px) brightness(0.6);
}

/* overlay */
.overlay{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9)),
linear-gradient(135deg,#0b0b0f,#1a1030);
}

/* noise */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.06;
}

/* header */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-weight:800;
font-size:26px;
}

/* center */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.round{opacity:0.7;margin-bottom:10px;}
.score{font-size:120px;font-weight:900;}
.format{
margin-top:10px;
padding:6px 18px;
background:#7c3aed;
display:inline-block;
font-weight:800;
}

/* teams */
.team{
position:absolute;
top:50%;
transform:translateY(-50%);
text-align:center;
}

.left{left:80px;}
.right{right:80px;}

.logo{
width:90px;
height:90px;
border:2px solid #fff;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
}

.logo img{width:70%;}
.teamName{font-weight:800;}

/* maps */
.maps{
position:absolute;
bottom:80px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:0 60px;
}

/* map */
.map{
width:200px;
height:90px;
position:relative;
overflow:hidden;
background:#111;
}

.map.disabled{opacity:0.3;}

.mapImg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.5;
}

.map::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.mapScore{
position:absolute;
left:10px;
top:10px;
font-size:26px;
font-weight:900;
}

.mapName{
position:absolute;
bottom:6px;
left:10px;
font-weight:800;
font-size:14px;
}

.win{
position:absolute;
right:8px;
bottom:8px;
width:18px;
}

.map.win1{box-shadow:0 0 10px #22c55e;}
.map.win2{box-shadow:0 0 10px #3b82f6;}

/* footer */
.footer{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
align-items:center;
font-weight:800;
}

.footer img{
width:18px;
margin-right:6px;
filter:invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="center">
<div class="round">{{ROUND}}</div>
<div class="score">{{SCORE1}} - {{SCORE2}}</div>
<div class="format">{{FORMAT}}</div>
</div>

<div class="team left">
<div class="logo"><img src="{{TEAM1_LOGO}}"></div>
<div class="teamName">{{TEAM1}}</div>
</div>

<div class="team right">
<div class="logo"><img src="{{TEAM2_LOGO}}"></div>
<div class="teamName">{{TEAM2}}</div>
</div>

<div class="maps">

<div class="map {{MAP1_CLASS}}">
<img src="{{MAP1_IMAGE}}" class="mapImg">
<div class="mapScore">{{MAP1_SCORE}}</div>
<div class="mapName">{{MAP1_NAME}}</div>
<img src="{{MAP1_WINNER}}" class="win">
</div>

<div class="map {{MAP2_CLASS}}">
<img src="{{MAP2_IMAGE}}" class="mapImg">
<div class="mapScore">{{MAP2_SCORE}}</div>
<div class="mapName">{{MAP2_NAME}}</div>
<img src="{{MAP2_WINNER}}" class="win">
</div>

<div class="map {{MAP3_CLASS}}">
<img src="{{MAP3_IMAGE}}" class="mapImg">
<div class="mapScore">{{MAP3_SCORE}}</div>
<div class="mapName">{{MAP3_NAME}}</div>
<img src="{{MAP3_WINNER}}" class="win">
</div>

<div class="map {{MAP4_CLASS}}">
<img src="{{MAP4_IMAGE}}" class="mapImg">
<div class="mapScore">{{MAP4_SCORE}}</div>
<div class="mapName">{{MAP4_NAME}}</div>
<img src="{{MAP4_WINNER}}" class="win">
</div>

<div class="map {{MAP5_CLASS}}">
<img src="{{MAP5_IMAGE}}" class="mapImg">
<div class="mapScore">{{MAP5_SCORE}}</div>
<div class="mapName">{{MAP5_NAME}}</div>
<img src="{{MAP5_WINNER}}" class="win">
</div>

</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
