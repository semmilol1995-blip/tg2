<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
color:white;
overflow:hidden;
position:relative;
background:#000;
}

/* BG */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(8px) brightness(0.35);
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.3),#000 80%);
}

/* NOISE */
.noise{
position:absolute;
width:100%;
height:100%;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
}

/* HEADER */
.header{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
}

/* CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.round{
opacity:0.7;
margin-bottom:10px;
}

.score{
font-size:120px;
font-weight:900;
}

.format{
margin-top:10px;
display:inline-block;
padding:6px 16px;
background:linear-gradient(90deg,#7c3aed,#3b82f6);
border-radius:4px;
font-weight:900;
}

/* TEAMS */
.teams{
position:absolute;
top:50%;
left:0;
width:100%;
display:flex;
justify-content:space-between;
transform:translateY(-50%);
padding:0 80px;
}

.team{
text-align:center;
}

.team img{
width:90px;
height:90px;
border:2px solid white;
padding:10px;
background:#000;
}

.teamName{
margin-top:10px;
font-weight:800;
}

/* MAPS WRAP */
.maps{
position:absolute;
bottom:90px;
width:100%;
display:flex;
justify-content:center;
gap:24px;
}

/* MAP */
.map{
width:190px;
height:110px;
position:relative;
overflow:hidden;
border-radius:6px;
background:#111;
}

/* FULL BG */
.map img.bgMap{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* DARK FADE */
.map::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

/* SCORE */
.mapScore{
position:absolute;
top:10px;
left:12px;
font-weight:900;
font-size:22px;
}

/* NAME */
.mapName{
position:absolute;
bottom:10px;
left:12px;
font-size:13px;
font-weight:800;
}

/* WINNER ICON */
.winIcon{
position:absolute;
bottom:10px;
right:12px;
width:22px;
height:22px;
}

/* STATES */
.map.win1{
box-shadow:0 0 18px rgba(34,197,94,0.9);
}

.map.win2{
box-shadow:0 0 18px rgba(59,130,246,0.9);
}

.map.disabled{
opacity:0.25;
filter:grayscale(1);
}

.map.hidden{
display:none;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-weight:800;
opacity:0.85;
}

.footer img{
width:18px;
margin-right:6px;
vertical-align:middle;
filter:invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="noise"></div>

<div class="header">{{TOURNAMENT}}</div>

<div class="center">
<div class="round">{{ROUND}}</div>
<div class="score">{{SCORE1}} - {{SCORE2}}</div>
<div class="format">{{FORMAT}}</div>
</div>

<div class="teams">

<div class="team">
<img src="{{TEAM1_LOGO}}">
<div class="teamName">{{TEAM1}}</div>
</div>

<div class="team">
<img src="{{TEAM2_LOGO}}">
<div class="teamName">{{TEAM2}}</div>
</div>

</div>

<div class="maps">

<div class="map {{MAP1_CLASS}}">
<img class="bgMap" src="{{MAP1_IMAGE}}">
<div class="mapScore">{{MAP1_SCORE}}</div>
<div class="mapName">{{MAP1_NAME}}</div>
<img class="winIcon" src="{{MAP1_WINNER}}">
</div>

<div class="map {{MAP2_CLASS}}">
<img class="bgMap" src="{{MAP2_IMAGE}}">
<div class="mapScore">{{MAP2_SCORE}}</div>
<div class="mapName">{{MAP2_NAME}}</div>
<img class="winIcon" src="{{MAP2_WINNER}}">
</div>

<div class="map {{MAP3_CLASS}}">
<img class="bgMap" src="{{MAP3_IMAGE}}">
<div class="mapScore">{{MAP3_SCORE}}</div>
<div class="mapName">{{MAP3_NAME}}</div>
<img class="winIcon" src="{{MAP3_WINNER}}">
</div>

<div class="map {{MAP4_CLASS}}">
<img class="bgMap" src="{{MAP4_IMAGE}}">
<div class="mapScore">{{MAP4_SCORE}}</div>
<div class="mapName">{{MAP4_NAME}}</div>
<img class="winIcon" src="{{MAP4_WINNER}}">
</div>

<div class="map {{MAP5_CLASS}}">
<img class="bgMap" src="{{MAP5_IMAGE}}">
<div class="mapScore">{{MAP5_SCORE}}</div>
<div class="mapName">{{MAP5_NAME}}</div>
<img class="winIcon" src="{{MAP5_WINNER}}">
</div>

</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
