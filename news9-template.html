<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
position:relative;
}

/* BG IMAGE */
.bg{
position:absolute;
bottom:0;
width:100%;
height:65%;
object-fit:cover;
}

/* OVERLAY (ГОЛОВНИЙ ГРАДІЄНТ) */
.overlay{
position:absolute;
top:0;
width:100%;
height:100%;
background:linear-gradient(
to bottom,
rgba(10,5,20,0.95) 0%,
rgba(20,10,40,0.95) 40%,
rgba(0,0,0,0.4) 65%,
rgba(0,0,0,0.95) 100%
);
}

/* GRAIN */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.12;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* CONTENT */
.content{
position:absolute;
top:120px;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
z-index:2;
}

/* LABEL */
.label{
background:#a855f7;
color:black;
font-weight:900;
padding:10px 28px;
font-size:22px;
margin-bottom:20px;
}

/* BOX */
.box{
width:760px;
padding:40px 30px;
background:rgba(0,0,0,0.6);
border:2px solid #a855f7;
backdrop-filter:blur(6px);
}

/* TEXT */
.text{
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.15;
text-transform:uppercase;
text-align:center;
letter-spacing:1px;
color:#e9d5ff;
text-shadow:0 0 25px rgba(168,85,247,0.6);
}

/* FOOTER */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
z-index:3;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="overlay"></div>
<div class="grain"></div>

<div class="content">

  <div class="label">{{LABEL}}</div>

  <div class="box">
    <div class="text">{{TEXT}}</div>
  </div>

</div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
