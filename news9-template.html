<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:#0b0b0f;
position:relative;
display:flex;
flex-direction:column;
}

/* TOP BLOCK */
.top{
background:linear-gradient(135deg,#0b0b0f,#1a1030);
display:flex;
flex-direction:column;
align-items:center;
padding:80px 40px 60px;
position:relative;
}

/* TEXT */
.text{
max-width:780px;
text-align:center;
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.15;
text-transform:uppercase;
letter-spacing:1px;
color:#e9d5ff;

text-shadow:
0 0 10px rgba(168,85,247,0.6),
0 0 25px rgba(168,85,247,0.4);
}

/* DIVIDER */
.divider{
position:absolute;
bottom:0;
width:100%;
height:2px;
background:linear-gradient(
to right,
transparent,
rgba(168,85,247,0.9),
transparent
);
}

/* LABEL */
.label{
position:absolute;
bottom:-14px;
left:50%;
transform:translateX(-50%);

background:#a855f7;
color:#000;

font-weight:900;
font-size:20px; /* 🔥 ключ — не 22 */

padding:10px 28px; /* 🔥 точні пропорції */

border-radius:0;

letter-spacing:0.5px;
text-transform:uppercase;

z-index:5;

box-shadow:
0 0 14px rgba(168,85,247,0.9),
0 0 28px rgba(168,85,247,0.35);
}
/* IMAGE WRAP */
.imageWrap{
flex:1;
position:relative;
}

/* IMAGE */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
object-position:center top;
}

/* FADE */
.fade{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(0,0,0,0.95),
rgba(0,0,0,0.4),
transparent
);
}

/* GRAIN */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.08;
background:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* FOOTER */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
z-index:6;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<div class="top">
  <div class="text">{{TEXT}}</div>
  <div class="divider"></div>
  <div class="label">{{LABEL}}</div>
</div>

<div class="imageWrap">
  <img src="{{IMAGE}}" class="bg">
  <div class="fade"></div>
</div>

<div class="grain"></div>

<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
