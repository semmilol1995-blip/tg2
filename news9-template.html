<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:#0b0b0f;
position:relative;
}

/* BG IMAGE */
.bg{
position:absolute;
bottom:0;
width:100%;
height:55%;
object-fit:cover;
}

/* TOP BLOCK */
.top{
position:absolute;
top:0;
width:100%;
height:55%;
background:linear-gradient(135deg,#0b0b0f,#1a1030);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:120px;

/* 🔥 ЛІНІЯ ТУТ */
border-bottom:1px solid rgba(168,85,247,0.7);
}

/* TEXT */
.text{
width:780px;
text-align:center;
font-size:{{FONTSIZE}};
font-weight:900;
line-height:1.15;
text-transform:uppercase;
letter-spacing:1px;

color:#e9d5ff;

text-shadow:
0 0 10px rgba(168,85,247,0.6),
0 0 25px rgba(168,85,247,0.4);
}

/* LABEL (ПРИВ’ЯЗАНИЙ ДО ЛІНІЇ) */
.label{
position:absolute;
top:55%;
left:50%;
transform:translateX(-50%) translateY(-60%);

background:#a855f7;
color:black;
font-weight:900;
padding:8px 22px;
font-size:18px;

z-index:5;

border-radius:4px;
letter-spacing:1px;
text-transform:uppercase;

box-shadow:0 0 18px rgba(168,85,247,0.6);
}

/* FADE НА ФОТО */
.fade{
position:absolute;
bottom:0;
width:100%;
height:55%;
background:linear-gradient(
to top,
rgba(0,0,0,0.95),
rgba(0,0,0,0.4),
transparent
);
}

/* GRAIN */
.grain{
position:absolute;
width:100%;
height:100%;
opacity:0.08;
background:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* FOOTER */
.bottomBar{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
font-size:18px;
font-weight:800;
color:white;
z-index:6;
}

.bottomBar img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <div class="text">{{TEXT}}</div>
</div>

<!-- IMAGE -->
<img src="{{IMAGE}}" class="bg">

<!-- LABEL -->
<div class="label">{{LABEL}}</div>

<!-- FADE -->
<div class="fade"></div>

<!-- GRAIN -->
<div class="grain"></div>

<!-- FOOTER -->
<div class="bottomBar">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
