<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* затемнення */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.85));
z-index:1;
}

/* grain */
.grain{
position:absolute;
inset:0;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.12;
z-index:2;
pointer-events:none;
}

/* stats */
.stats{
position:absolute;
bottom:300px;
width:100%;
display:flex;
justify-content:center;
gap:50px;
z-index:3;
}

.stat{
display:flex;
flex-direction:column;
align-items:center;
}

/* значення */
.box{
background:linear-gradient(90deg, rgba(168,85,247,0.7), rgba(168,85,247,0.2));
padding:16px 26px;
font-size:60px;
font-weight:900;
color:white;
min-width:170px;
text-align:center;
}

/* підпис */
.statLabel{
margin-top:8px;
font-size:20px;
font-weight:800;
color:white;
letter-spacing:1px;
}

/* TEXT */
.subtitle{
position:absolute;
bottom:230px;
width:100%;
text-align:center;
font-size:32px;
font-weight:800;
color:white;
letter-spacing:2px;
z-index:4;
}

/* TITLE */
.title{
position:absolute;
bottom:90px;
width:100%;
text-align:center;
font-size:110px;
font-weight:900;
color:#A855F7;
z-index:4;
}

/* footer (🔥 виправлений) */
.footer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
justify-content:center;
gap:8px;

color:white;
font-weight:800;
font-size:18px;

z-index:10;
}

.footer img{
width:20px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="grain"></div>

<div class="stats">

  <div class="stat">
    <div class="box">{{STAT1}}</div>
    <div class="statLabel">RATING 3.0</div>
  </div>

  <div class="stat">
    <div class="box">{{STAT2}}</div>
    <div class="statLabel">ADR</div>
  </div>

  <div class="stat">
    <div class="box">{{STAT3}}</div>
    <div class="statLabel">K/D</div>
  </div>

</div>

<div class="subtitle">{{TEXT}}</div>

<div class="title">СТАТИСТИКА</div>

<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
