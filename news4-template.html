<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:#050507;
font-family:'Inter', sans-serif;
overflow:hidden;
position:relative;
color:white;
}

/* LEFT BG */
.leftBg{
position:absolute;
inset:0;
background:#050507;
}

/* LEFT FADE */
.leftFade{
position:absolute;
left:0;
top:0;
width:570px;
height:100%;
background:linear-gradient(90deg,#050507 72%, transparent);
z-index:2;
}

/* RIGHT BLOCK */
.rightWrap{
position:absolute;
top:24px;
right:24px;
bottom:24px;
width:373px;
z-index:3;
}

.right{
position:relative;
width:100%;
height:100%;
border-radius:4px;
overflow:hidden;

background:
linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 25%, transparent 55%),
linear-gradient(180deg,#7c3aed 0%, #5b21b6 100%);
}

/* DARK BOTTOM */
.right::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg,transparent 55%, rgba(0,0,0,0.7) 100%);
}

/* TEXTURE */
.texture{
position:absolute;
inset:0;
opacity:0.08;
background:url("https://grainy-gradients.vercel.app/noise.svg");
}

/* PLAYER */
.player{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
height:110%;
z-index:2;
}

.player img{
height:100%;
object-fit:contain;
filter:drop-shadow(0 10px 30px rgba(0,0,0,0.6));
}

/* TOP BAR */
.topBar{
position:absolute;
top:13px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:9px;
z-index:5;
}

.topLeft{
background:#1a1a1f;
padding:5px 9px;
font-size:14px;
font-weight:800;
}

.topRight{
font-size:18px;
font-weight:900;
}

/* NAME */
.name{
position:absolute;
bottom:115px;
width:100%;
text-align:center;
font-size:48px;
font-weight:900;
z-index:5;
}

.sub{
position:absolute;
bottom:90px;
width:100%;
text-align:center;
font-size:16px;
letter-spacing:2px;
opacity:0.8;
z-index:5;
}

.line{
position:absolute;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:180px;
height:4px;
background:#a855f7;
z-index:5;
}

/* LEFT STATS (3 BLOCKS FIXED) */
.left{
position:absolute;
left:70px;
top:110px;
display:flex;
flex-direction:column;
gap:95px;
z-index:4;
}

.value{
font-size:110px;
font-weight:800;
line-height:0.85;
transform:skewX(-6deg);
}

.bar{
margin-top:8px;
width:300px;
height:32px;
display:flex;
align-items:center;
padding-left:18px;
font-size:16px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#7c3aed,#a855f7);
}

/* SIDE TEXT */
.side{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%) rotate(-90deg);
font-size:12px;
letter-spacing:6px;
opacity:0.25;
}

/* FOOTER */
.footer{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
font-weight:800;
font-size:18px;
z-index:10;
}

.footer img{
width:20px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<div class="leftBg"></div>
<div class="leftFade"></div>

<div class="side">ПОДВАЛ CS2</div>

<!-- LEFT (3 STATS) -->
<div class="left">
  <div>
    <div class="value">{{STAT1}}</div>
    <div class="bar">RATING</div>
  </div>

  <div>
    <div class="value">{{STAT2}}</div>
    <div class="bar">K-D</div>
  </div>

  <div>
    <div class="value">{{STAT3}}</div>
    <div class="bar">ADR</div>
  </div>
</div>

<!-- RIGHT -->
<div class="rightWrap">
  <div class="right">
    <div class="texture"></div>

    <div class="topBar">
      <div class="topLeft">ПОДВАЛ CS'А</div>
      <div class="topRight">× BetBoom</div>
    </div>

    <div class="player">
      <img src="{{PLAYER_IMAGE}}">
    </div>

    <div class="name">{{TEXT}}</div>
    <div class="sub">ON OVERPASS</div>
    <div class="line"></div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
