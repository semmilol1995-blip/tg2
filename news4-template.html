<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
position:relative;
background:#050507;
}

/* ===== RIGHT BG ===== */
.bgRight{
position:absolute;
right:0;
top:0;
width:410px;
height:100%;
background:linear-gradient(180deg,#7c3aed 0%, #5b21b6 100%);
z-index:1;
}

.bgRight:before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.2));
}

/* ===== GRAIN ===== */
.grain{
position:absolute;
inset:0;
background:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.05;
z-index:2;
}

/* ===== SIDE TEXT ===== */
.side{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%) rotate(-90deg);

font-size:12px;
letter-spacing:7px;
color:#8b8ba7;
opacity:0.35;
}

/* ===== LEFT STATS ===== */
.left{
position:absolute;
left:82px;
top:95px;
z-index:5;
display:flex;
flex-direction:column;
gap:78px;
}

.value{
font-size:118px;
font-weight:900;
color:#f1f1f1;
line-height:0.85;
transform:skewX(-7deg);
letter-spacing:1px;
}

.bar{
margin-top:14px;
width:332px;
height:40px;

display:flex;
align-items:center;
padding-left:22px;

font-size:18px;
font-weight:800;
letter-spacing:2px;
color:white;

background:linear-gradient(90deg,#7c3aed,#a855f7);
}

/* ===== PLAYER ===== */
.playerWrap{
position:absolute;
right:0;
bottom:0;
width:410px;
height:100%;
z-index:4;
overflow:hidden;
display:flex;
align-items:flex-end;
justify-content:center;
}

.playerWrap img{
height:96%;
object-fit:contain;
transform:translateX(48px);
}

/* ===== LOGO ===== */
.teamLogo{
position:absolute;
right:132px;
bottom:248px;
z-index:6;
}

.teamLogo img{
width:58px;
opacity:0.95;
}

/* ===== NAME ===== */
.playerName{
position:absolute;
right:110px;
bottom:145px;
z-index:6;

font-size:60px;
font-weight:900;
letter-spacing:2px;
color:#f1f1f1;
}

.playerSub{
position:absolute;
right:112px;
bottom:110px;
z-index:6;

font-size:16px;
letter-spacing:2px;
color:#cfcfe6;
}

.line{
position:absolute;
right:110px;
bottom:96px;
width:220px;
height:4px;
background:#a855f7;
}

/* ===== FOOTER ===== */
.footer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
gap:8px;

color:white;
font-weight:800;
font-size:18px;
z-index:10;
}

.footer img{
width:20px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<div class="bgRight"></div>
<div class="grain"></div>

<div class="side">ПОДВАЛ CS2</div>

<!-- LEFT -->
<div class="left">

  <div>
    <div class="value">{{STAT1}}</div>
    <div class="bar">RATING</div>
  </div>

  <div>
    <div class="value">{{STAT2}}</div>
    <div class="bar">SWING%</div>
  </div>

  <div>
    <div class="value">{{STAT3}}</div>
    <div class="bar">ADR</div>
  </div>

</div>

<!-- PLAYER -->
<div class="playerWrap">
  <img src="{{PLAYER_IMAGE}}">
</div>

<!-- LOGO -->
<div class="teamLogo">
  <img src="{{TEAM_LOGO}}">
</div>

<!-- NAME -->
<div class="playerName">{{TEXT}}</div>
<div class="playerSub">ON MATCH</div>
<div class="line"></div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
