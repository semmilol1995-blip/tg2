<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:#06060a;
font-family:'Inter', sans-serif;
overflow:hidden;
position:relative;
}

/* ===== RIGHT PANEL ===== */
.right{
position:absolute;
right:0;
top:0;
width:420px;
height:100%;
background:linear-gradient(180deg,#7c3aed,#5b21b6);
z-index:1;
}

/* ===== LEFT DARK OVERLAY ===== */
.leftFade{
position:absolute;
left:0;
top:0;
width:580px;
height:100%;
background:linear-gradient(90deg,#050507 60%, transparent);
z-index:2;
}

/* ===== GRAIN ===== */
.grain{
position:absolute;
inset:0;
background:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.06;
z-index:3;
}

/* ===== SIDE TEXT ===== */
.side{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%) rotate(-90deg);
font-size:13px;
letter-spacing:6px;
color:#8b8ba7;
opacity:0.35;
z-index:4;
}

/* ===== TOP BAR ===== */
.topBar{
position:absolute;
top:30px;
right:140px;
display:flex;
align-items:center;
gap:10px;
z-index:6;
}

.topLeft{
background:#1a1a1f;
padding:6px 10px;
font-weight:800;
font-size:14px;
}

.topRight{
font-size:22px;
font-weight:900;
}

/* ===== LEFT STATS ===== */
.left{
position:absolute;
left:80px;
top:80px;
z-index:5;
display:flex;
flex-direction:column;
gap:90px;
}

.value{
font-size:130px;
font-weight:900;
color:#f1f1f1;
line-height:0.8;
transform:skewX(-8deg);
}

.bar{
margin-top:16px;
width:360px;
height:44px;
display:flex;
align-items:center;
padding-left:22px;
font-size:20px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#7c3aed,#a855f7);
}

/* ===== PLAYER ===== */
.player{
position:absolute;
right:0;
bottom:0;
width:420px;
height:100%;
display:flex;
align-items:flex-end;
justify-content:center;
overflow:hidden;
z-index:4;
}

.player img{
height:100%;
object-fit:cover;
transform:translateX(60px);
}

/* ===== NAME ===== */
.name{
position:absolute;
right:120px;
bottom:150px;
font-size:64px;
font-weight:900;
z-index:6;
}

.sub{
position:absolute;
right:120px;
bottom:115px;
font-size:18px;
letter-spacing:2px;
color:#cfcfe6;
z-index:6;
}

.line{
position:absolute;
right:120px;
bottom:100px;
width:230px;
height:4px;
background:#a855f7;
z-index:6;
}

/* ===== LOGO ===== */
.logo{
position:absolute;
right:160px;
bottom:260px;
z-index:6;
}

.logo img{
width:70px;
}

/* ===== FOOTER ===== */
.footer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
font-weight:800;
z-index:10;
}

.footer img{
width:20px;
filter:invert(1);
}
</style>
</head>

<body>

<div class="right"></div>
<div class="leftFade"></div>
<div class="grain"></div>

<div class="side">ПОДВАЛ CS2</div>

<!-- TOP -->
<div class="topBar">
  <div class="topLeft">ПОДВАЛ CS'А</div>
  <div class="topRight">× BetBoom</div>
</div>

<!-- STATS -->
<div class="left">
  <div>
    <div class="value">{{STAT1}}</div>
    <div class="bar">RATING</div>
  </div>

  <div>
    <div class="value">{{STAT2}}</div>
    <div class="bar">SWING%</div>
  </div>

  <div>
    <div class="value">{{STAT3}}</div>
    <div class="bar">ADR</div>
  </div>
</div>

<!-- PLAYER -->
<div class="player">
  <img src="{{PLAYER_IMAGE}}">
</div>

<!-- LOGO -->
<div class="logo">
  <img src="{{TEAM_LOGO}}">
</div>

<!-- NAME -->
<div class="name">{{TEXT}}</div>
<div class="sub">ON MATCH</div>
<div class="line"></div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
