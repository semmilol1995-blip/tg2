<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:#050507;
font-family:'Inter', sans-serif;
overflow:hidden;
position:relative;
color:white;
}

/* ===== LEFT BACKGROUND ===== */
.leftBg{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
background:#050507;
}

/* LEFT FADE (як у рефі) */
.leftFade{
position:absolute;
left:0;
top:0;
width:580px;
height:100%;
background:linear-gradient(90deg,#050507 70%, transparent);
z-index:2;
}

/* ===== RIGHT BLOCK (ГОЛОВНЕ) ===== */
.rightWrap{
position:absolute;
top:20px;
right:20px;
bottom:20px;
width:380px;
z-index:3;
}

/* сам фіолетовий блок */
.right{
position:relative;
width:100%;
height:100%;
border-radius:6px;
overflow:hidden;

/* градієнти як у BLAST */
background:
linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 25%, transparent 50%),
linear-gradient(180deg,#7c3aed 0%, #5b21b6 100%);
}

/* затемнення знизу */
.right::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg,transparent 50%, rgba(0,0,0,0.65) 100%);
}

/* texture */
.texture{
position:absolute;
inset:0;
opacity:0.08;
background:url("https://grainy-gradients.vercel.app/noise.svg");
}

/* ===== PLAYER ===== */
.player{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
height:105%;
z-index:2;
}

.player img{
height:100%;
object-fit:contain;
filter:drop-shadow(0 10px 40px rgba(0,0,0,0.6));
}

/* ===== TOP BAR ===== */
.topBar{
position:absolute;
top:14px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:5;
}

.topLeft{
background:#1a1a1f;
padding:6px 10px;
font-size:14px;
font-weight:800;
}

.topRight{
font-size:20px;
font-weight:900;
}

/* ===== NAME ===== */
.name{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:56px;
font-weight:900;
z-index:5;
}

.sub{
position:absolute;
bottom:90px;
width:100%;
text-align:center;
font-size:16px;
letter-spacing:2px;
opacity:0.8;
z-index:5;
}

.line{
position:absolute;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:200px;
height:4px;
background:#a855f7;
z-index:5;
}

/* ===== LEFT STATS ===== */
.left{
position:absolute;
left:70px;
top:90px;
display:flex;
flex-direction:column;
gap:70px;
z-index:4;
}

.value{
font-size:110px;
font-weight:800;
line-height:0.9;
transform:skewX(-6deg);
}

.bar{
margin-top:10px;
width:300px;
height:34px;
display:flex;
align-items:center;
padding-left:18px;
font-size:16px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#7c3aed,#a855f7);
}

/* ===== SIDE TEXT ===== */
.side{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%) rotate(-90deg);
font-size:12px;
letter-spacing:6px;
opacity:0.25;
z-index:4;
}

/* ===== FOOTER ===== */
.footer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
font-weight:800;
font-size:18px;
z-index:10;
}

.footer img{
width:20px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<div class="leftBg"></div>
<div class="leftFade"></div>

<div class="side">ПОДВАЛ CS2</div>

<!-- LEFT -->
<div class="left">
  <div>
    <div class="value">{{STAT1}}</div>
    <div class="bar">RATING</div>
  </div>

  <div>
    <div class="value">{{STAT2}}</div>
    <div class="bar">K-D</div>
  </div>

  <div>
    <div class="value">{{STAT3}}</div>
    <div class="bar">ADR</div>
  </div>

  <div>
    <div class="value">{{STAT4}}</div>
    <div class="bar">SWING%</div>
  </div>
</div>

<!-- RIGHT BLOCK -->
<div class="rightWrap">

  <div class="right">
    <div class="texture"></div>

    <div class="topBar">
      <div class="topLeft">ПОДВАЛ CS'А</div>
      <div class="topRight">× BetBoom</div>
    </div>

    <div class="player">
      <img src="{{PLAYER_IMAGE}}">
    </div>

    <div class="name">{{TEXT}}</div>
    <div class="sub">ON OVERPASS</div>
    <div class="line"></div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
