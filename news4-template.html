<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:#0a0a0a;
font-family:'Inter', sans-serif;
overflow:hidden;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(20px) brightness(0.4);
}

/* wrapper */
.wrapper{
position:relative;
width:100%;
height:100%;
}

/* stats */
.stats{
position:absolute;
top:80px;
left:60px;
width:65%;
display:flex;
flex-direction:column;
gap:25px;
z-index:1;
}

.stat{
background:linear-gradient(90deg, rgba(168,85,247,0.25), transparent);
padding:25px 30px;
display:flex;
align-items:center;
gap:30px;
}

.value{
font-size:64px;
font-weight:900;
color:white;
min-width:160px;
}

.labelSmall{
font-size:28px;
font-weight:800;
color:#A855F7;
}

/* player */
.player{
position:absolute;
right:0;
bottom:0;
height:95%;
z-index:2;
pointer-events:none;
}

/* subtitle */
.subtitle{
position:absolute;
bottom:260px;
left:60px;
font-size:36px;
font-weight:800;
color:white;
z-index:3;
}

/* title */
.title{
position:absolute;
bottom:120px;
left:60px;
font-size:110px;
font-weight:900;
color:#A855F7;
z-index:3;
}

/* footer */
.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:white;
font-weight:800;
font-size:18px;
z-index:4;
}

.footer img{
width:20px;
vertical-align:middle;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">

<div class="wrapper">

<!-- stats -->
<div class="stats">

<div class="stat">
<div class="value">{{STAT1}}</div>
<div class="labelSmall">RATING 3.0</div>
</div>

<div class="stat">
<div class="value">{{STAT2}}</div>
<div class="labelSmall">ROUND SWING</div>
</div>

<div class="stat">
<div class="value">{{STAT3}}</div>
<div class="labelSmall">K/D</div>
</div>

</div>

<!-- player -->
<img src="{{PLAYER_IMAGE}}" class="player">

<!-- text -->
<div class="subtitle">{{TEXT}}</div>
<div class="title">СТАТИСТИКА</div>

</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
