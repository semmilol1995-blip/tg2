<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* затемнення */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(180deg, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
}

/* 🔥 STAT В РЯД І ПРИВ’ЯЗКА ДО НИЗУ */
.stats{
position:absolute;
bottom:340px; /* 🔥 ключ — над TEXT */
width:100%;
display:flex;
justify-content:center;
gap:60px;
z-index:2;
}

.stat{
display:flex;
flex-direction:column;
align-items:center;
}

/* блок числа */
.box{
background:linear-gradient(90deg, rgba(168,85,247,0.7), rgba(168,85,247,0.2));
padding:18px 28px;
font-size:64px;
font-weight:900;
color:white;
min-width:180px;
text-align:center;
}

/* підпис під stat */
.statLabel{
margin-top:10px;
font-size:22px;
font-weight:800;
color:white;
letter-spacing:1px;
}

/* TEXT */
.subtitle{
position:absolute;
bottom:260px;
width:100%;
text-align:center;
font-size:36px;
font-weight:800;
color:white;
letter-spacing:2px;
z-index:3;
}

/* TITLE */
.title{
position:absolute;
bottom:100px;
width:100%;
text-align:center;
font-size:120px;
font-weight:900;
color:#A855F7;
z-index:3;
}

/* footer */
.footer{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
color:white;
font-weight:800;
font-size:18px;
z-index:4;
}

.footer img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>

<!-- 🔥 STAT -->
<div class="stats">

  <div class="stat">
    <div class="box">{{STAT1}}</div>
    <div class="statLabel">RATING 3.0</div>
  </div>

  <div class="stat">
    <div class="box">{{STAT2}}</div>
    <div class="statLabel">ROUND SWING</div>
  </div>

  <div class="stat">
    <div class="box">{{STAT3}}</div>
    <div class="statLabel">K/D</div>
  </div>

</div>

<!-- 🔥 TEXT -->
<div class="subtitle">{{TEXT}}</div>

<!-- 🔥 TITLE -->
<div class="title">СТАТИСТИКА</div>

<!-- footer -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  t.me/zbr4_cast
</div>

</body>
</html>
