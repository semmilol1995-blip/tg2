<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:#050507;
position:relative;
}

/* BG */
.bg{
position:absolute;
inset:0;
object-fit:cover;
}

/* overlay */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 60%);
z-index:1;
}

/* grain */
.grain{
position:absolute;
inset:0;
background:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.1;
z-index:2;
}

/* RIGHT PLAYER */
.player{
position:absolute;
right:0;
bottom:0;
height:100%;
z-index:3;

display:flex;
align-items:flex-end;
}

.player img{
height:95%;
object-fit:contain;
}

/* PLAYER OVERLAY GRADIENT */
.player::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(90deg, rgba(0,0,0,0.8), transparent 40%);
}

/* TEAM LOGO */
.teamLogo{
position:absolute;
bottom:140px;
right:120px;
z-index:5;
}

.teamLogo img{
width:90px;
opacity:0.9;
}

/* PLAYER NAME */
.playerName{
position:absolute;
bottom:90px;
right:120px;
z-index:5;

font-size:64px;
font-weight:900;
color:white;
letter-spacing:2px;
}

/* SUBTEXT */
.playerSub{
position:absolute;
bottom:50px;
right:120px;
z-index:5;

font-size:20px;
color:#ccc;
letter-spacing:2px;
}

/* LEFT STATS */
.stats{
position:absolute;
left:80px;
top:120px;
z-index:5;

display:flex;
flex-direction:column;
gap:40px;
}

/* SINGLE STAT */
.stat{
display:flex;
flex-direction:column;
}

/* VALUE */
.value{
font-size:96px;
font-weight:900;
color:white;
line-height:1;
}

/* LABEL */
.label{
margin-top:10px;

display:inline-block;
padding:10px 18px;

background:linear-gradient(90deg, #7c3aed, #a855f7);
font-size:20px;
font-weight:800;
letter-spacing:2px;
color:white;
}

/* SIDE TEXT (optional aesthetic) */
.sideText{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%) rotate(-90deg);

font-size:14px;
letter-spacing:6px;
color:#aaa;
opacity:0.4;
}

/* FOOTER (НЕ ЧІПАЄМО) */
.footer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
justify-content:center;
gap:8px;

color:white;
font-weight:800;
font-size:18px;

z-index:10;
}

.footer img{
width:20px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>
<div class="grain"></div>

<!-- LEFT STATS -->
<div class="stats">

  <div class="stat">
    <div class="value">{{STAT1}}</div>
    <div class="label">RATING</div>
  </div>

  <div class="stat">
    <div class="value">{{STAT2}}</div>
    <div class="label">SWING%</div>
  </div>

  <div class="stat">
    <div class="value">{{STAT3}}</div>
    <div class="label">ADR</div>
  </div>

</div>

<!-- PLAYER -->
<div class="player">
  <img src="{{PLAYER_IMAGE}}">
</div>

<!-- TEAM LOGO -->
<div class="teamLogo">
  <img src="{{TEAM_LOGO}}">
</div>

<!-- PLAYER NAME -->
<div class="playerName">{{TEXT}}</div>

<div class="playerSub">ON MATCH</div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
