<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:#050507;
font-family:'Inter', sans-serif;
overflow:hidden;
position:relative;
color:white;
}

/* RIGHT PANEL */
.right{
position:absolute;
right:0;
top:0;
width:410px;
height:100%;
background:linear-gradient(180deg,#7c3aed,#5b21b6);
z-index:1;
}

/* LEFT DARK */
.fade{
position:absolute;
left:0;
top:0;
width:560px;
height:100%;
background:linear-gradient(90deg,#050507 75%, transparent);
z-index:2;
}

/* GRAIN */
.grain{
position:absolute;
inset:0;
background:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.05;
z-index:3;
}

/* SIDE TEXT */
.side{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%) rotate(-90deg);
font-size:12px;
letter-spacing:6px;
color:white;
opacity:0.25;
z-index:4;
}

/* TOP BAR */
.topBar{
position:absolute;
top:30px;
right:130px;
display:flex;
gap:10px;
align-items:center;
z-index:6;
}

.topLeft{
background:#1a1a1f;
padding:6px 10px;
font-size:14px;
font-weight:800;
color:white;
}

.topRight{
font-size:20px;
font-weight:900;
color:white;
}

/* LEFT STATS */
.left{
position:absolute;
left:70px;
top:100px;
display:flex;
flex-direction:column;
gap:72px;
z-index:5;
}

.value{
font-size:104px;
font-weight:800;
line-height:0.9;
transform:skewX(-6deg);
color:white;
}

.bar{
margin-top:10px;
width:300px;
height:34px;
display:flex;
align-items:center;
padding-left:18px;
font-size:16px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#7c3aed,#a855f7);
color:white;
}

/* PLAYER */
.player{
position:absolute;
right:0;
bottom:0;
width:410px;
height:100%;
display:flex;
align-items:flex-end;
justify-content:center;
overflow:hidden;
z-index:4;
}

.player img{
height:92%;
object-fit:contain;
transform:translateX(30px);
}

/* LOGO */
.logo{
position:absolute;
right:140px;
bottom:300px;
z-index:6;
}

.logo img{
width:60px;
}

/* NAME */
.name{
position:absolute;
right:110px;
bottom:150px;
font-size:60px;
font-weight:900;
color:white;
z-index:10;
}

.sub{
position:absolute;
right:110px;
bottom:115px;
font-size:16px;
letter-spacing:2px;
color:white;
opacity:0.8;
z-index:10;
}

.line{
position:absolute;
right:110px;
bottom:100px;
width:200px;
height:4px;
background:#a855f7;
z-index:10;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
font-weight:800;
font-size:18px;
color:white;
z-index:10;
}

.footer img{
width:20px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<div class="right"></div>
<div class="fade"></div>
<div class="grain"></div>

<div class="side">ПОДВАЛ CS2</div>

<!-- TOP -->
<div class="topBar">
  <div class="topLeft">ПОДВАЛ CS'А</div>
  <div class="topRight">× BetBoom</div>
</div>

<!-- STATS -->
<div class="left">
  <div>
    <div class="value">{{STAT1}}</div>
    <div class="bar">RATING</div>
  </div>

  <div>
    <div class="value">{{STAT2}}</div>
    <div class="bar">SWING%</div>
  </div>

  <div>
    <div class="value">{{STAT3}}</div>
    <div class="bar">ADR</div>
  </div>
</div>

<!-- PLAYER -->
<div class="player">
  <img src="{{PLAYER_IMAGE}}">
</div>

<!-- LOGO -->
<div class="logo">
  <img src="{{TEAM_LOGO}}">
</div>

<!-- NAME -->
<div class="name">{{TEXT}}</div>
<div class="sub">ON MATCH</div>
<div class="line"></div>

<!-- FOOTER -->
<div class="footer">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
  <span>t.me/zbr4_cast</span>
</div>

</body>
</html>
