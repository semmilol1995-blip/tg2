<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
background:#0a0a0a;
font-family:'Inter', sans-serif;
overflow:hidden;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(20px) brightness(0.4);
}

/* player */
.player{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
height:90%;
z-index:1;
opacity:0.9;
}

/* stats */
.stats{
position:absolute;
top:100px;
left:60px;
width:70%;
display:flex;
flex-direction:column;
gap:25px;
z-index:2;
}

.stat{
display:flex;
align-items:center;
}

.box{
background:linear-gradient(90deg, rgba(168,85,247,0.6), rgba(168,85,247,0.2));
padding:18px 24px;
font-size:54px;
font-weight:900;
color:white;
min-width:260px;
}

.statLabel{
margin-left:20px;
font-size:28px;
font-weight:800;
color:#A855F7;
}

/* label */
.label{
position:absolute;
bottom:340px;
left:60px;
font-size:28px;
font-weight:900;
letter-spacing:2px;
color:#A855F7;
z-index:4;
}

/* subtitle */
.subtitle{
position:absolute;
bottom:260px;
left:60px;
font-size:32px;
font-weight:800;
color:white;
z-index:4;
}

/* title */
.title{
position:absolute;
bottom:80px;
left:60px;
font-size:110px;
font-weight:900;
color:#A855F7;
z-index:4;
}

/* footer */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
color:white;
font-weight:800;
font-size:18px;
z-index:5;
}

.footer img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<img src="{{PLAYER_IMAGE}}" class="player">

<div class="stats">

<div class="stat">
<div class="box">{{STAT1}}</div>
<div class="statLabel">RATING 3.0</div>
</div>

<div class="stat">
<div class="box">{{STAT2}}</div>
<div class="statLabel">ROUND SWING</div>
</div>

<div class="stat">
<div class="box">{{STAT3}}</div>
<div class="statLabel">K/D</div>
</div>

</div>

<div class="label">{{LABEL}}</div>
<div class="subtitle">{{TEXT}}</div>
<div class="title">СТАТИСТИКА</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
