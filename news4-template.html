<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', sans-serif;
overflow:hidden;
background:black;
}

/* фон */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* затемнення як у рефі */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(180deg, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
}

/* stats */
.stats{
position:absolute;
top:120px;
left:60px;
width:70%;
display:flex;
flex-direction:column;
gap:20px;
z-index:2;
}

.stat{
display:flex;
align-items:center;
}

/* фіолет блок */
.box{
background:linear-gradient(90deg, rgba(168,85,247,0.7), rgba(168,85,247,0.2));
padding:20px 28px;
font-size:64px;
font-weight:900;
color:white;
min-width:240px;
}

/* текст справа */
.statLabel{
margin-left:20px;
font-size:28px;
font-weight:800;
color:#A855F7;
}

/* центр текст */
.subtitle{
position:absolute;
top:470px;
width:100%;
text-align:center;
font-size:36px;
font-weight:800;
color:white;
letter-spacing:2px;
z-index:3;
}

/* великий заголовок */
.title{
position:absolute;
bottom:100px;
width:100%;
text-align:center;
font-size:120px;
font-weight:900;
color:#A855F7;
z-index:3;
}

/* footer */
.footer{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
color:white;
font-weight:800;
font-size:18px;
z-index:4;
}

.footer img{
width:20px;
margin-right:8px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<img src="{{IMAGE}}" class="bg">
<div class="overlay"></div>

<div class="stats">

<div class="stat">
<div class="box">{{STAT1}}</div>
<div class="statLabel">RATING 3.0</div>
</div>

<div class="stat">
<div class="box">{{STAT2}}</div>
<div class="statLabel">ROUND SWING</div>
</div>

<div class="stat">
<div class="box">{{STAT3}}</div>
<div class="statLabel">K/D</div>
</div>

</div>

<div class="subtitle">{{TEXT}}</div>
<div class="title">СТАТИСТИКА</div>

<div class="footer">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
t.me/zbr4_cast
</div>

</body>
</html>
